<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Models & Agents — Written briefing summaries on AI models, agent frameworks, and practical AI developments.">
    <title>Models &amp; Agents | Briefing Summaries</title>
    <style>
        :root { --ma-primary: #8B5CF6; --ma-alt: #06B6D4; --ma-bg: #0B0D1A; --ma-card: #12152A; --ma-ink: #ffffff; --ma-muted: #8B8FAE; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--ma-bg); color: var(--ma-ink); line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { background: linear-gradient(135deg, var(--ma-primary), var(--ma-alt)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { color: var(--ma-muted); margin-bottom: 2rem; }
        .summary-card { background: var(--ma-card); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #1E2140; }
        .summary-card h2 { font-size: 1.1rem; color: var(--ma-primary); margin-bottom: 0.25rem; }
        .summary-card .date { color: var(--ma-muted); font-size: 0.9rem; margin-bottom: 1rem; }
        .summary-card .content { white-space: pre-wrap; font-size: 0.95rem; color: var(--ma-muted); }
        .summary-card .content strong { color: var(--ma-ink); }
        .summary-card audio { width: 100%; margin-top: 1rem; }
        .links { margin-top: 2rem; }
        .links a { color: var(--ma-alt); text-decoration: none; margin-right: 1.5rem; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
        #loading { color: var(--ma-muted); font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Models &amp; Agents — Briefings</h1>
        <p class="subtitle">Written summaries of daily AI model and agent development briefings.</p>

        <div id="summaries">
            <p id="loading">Loading briefings...</p>
        </div>

        <div class="links">
            <a href="models-agents.html">Podcast Player</a>
            <a href="models_agents_podcast.rss">RSS Feed</a>
            <a href="network.html">Nerra Network</a>
        </div>
    </div>

    <script>
        const JSON_URL = 'digests/models_agents/summaries_models_agents.json';

        async function loadSummaries() {
            try {
                const resp = await fetch(JSON_URL);
                const data = await resp.json();
                const container = document.getElementById('summaries');
                container.innerHTML = '';

                const summaries = data.summaries || data;
                if (!summaries || !summaries.length) {
                    container.innerHTML = '<p style="color:var(--ma-muted);text-align:center;padding:2rem 0;">No briefings available yet. Check back after the first episode airs!</p>';
                    return;
                }

                summaries.forEach(ep => {
                    const card = document.createElement('div');
                    card.className = 'summary-card';

                    let dateStr = '';
                    try {
                        const d = new Date(ep.date);
                        dateStr = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                    } catch { dateStr = ep.date || ''; }

                    let contentHtml = '';
                    if (ep.content) {
                        contentHtml = escapeHtml(ep.content);
                        contentHtml = contentHtml.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                        contentHtml = contentHtml.replace(/^### (.+)$/gm, '<strong style="color:var(--ma-primary);">$1</strong>');
                        contentHtml = contentHtml.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--ma-alt);">$1</a>');
                    }

                    let audioHtml = '';
                    if (ep.audio_url) {
                        audioHtml = `<audio controls preload="none" src="${ep.audio_url}"></audio>`;
                    }

                    card.innerHTML = `
                        <h2>${escapeHtml(ep.episode_title || 'Episode')}</h2>
                        <div class="date">${dateStr}</div>
                        <div class="content">${contentHtml}</div>
                        ${audioHtml}
                    `;
                    container.appendChild(card);
                });
            } catch {
                document.getElementById('summaries').innerHTML = '<p style="color:var(--ma-muted);text-align:center;padding:2rem 0;">No briefings available yet. Check back after the first episode airs!</p>';
            }
        }

        function escapeHtml(s) {
            const el = document.createElement('span');
            el.textContent = s;
            return el.innerHTML;
        }

        loadSummaries();
    </script>
</body>
</html>
