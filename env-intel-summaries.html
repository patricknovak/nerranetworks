<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Environmental Intelligence - Written briefing summaries for BC environmental professionals.">
    <title>Environmental Intelligence | Briefing Summaries</title>
    <style>
        :root { --ei-primary: #1B5E20; --ei-bg: #FAFDF6; --ei-ink: #1a1a2e; --ei-muted: #5a6a5a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--ei-bg); color: var(--ei-ink); line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
        h1 { color: var(--ei-primary); font-size: 1.8rem; margin-bottom: 0.5rem; }
        .subtitle { color: var(--ei-muted); margin-bottom: 2rem; }
        .summary-card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .summary-card h2 { font-size: 1.1rem; color: var(--ei-primary); margin-bottom: 0.25rem; }
        .summary-card .date { color: var(--ei-muted); font-size: 0.9rem; margin-bottom: 1rem; }
        .summary-card .content { white-space: pre-wrap; font-size: 0.95rem; }
        .summary-card audio { width: 100%; margin-top: 1rem; }
        .links { margin-top: 2rem; }
        .links a { color: var(--ei-primary); text-decoration: none; margin-right: 1.5rem; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
        #loading { color: var(--ei-muted); font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Environmental Intelligence — Briefings</h1>
        <p class="subtitle">Written summaries of daily environmental regulatory and compliance briefings.</p>

        <div id="summaries">
            <p id="loading">Loading briefings...</p>
        </div>

        <div class="links">
            <a href="env-intel.html">🎧 Podcast Player</a>
            <a href="env_intel_podcast.rss">📡 RSS Feed</a>
        </div>
    </div>

    <script>
        const JSON_URL = 'digests/summaries_env_intel.json';

        async function loadSummaries() {
            try {
                const resp = await fetch(JSON_URL);
                const data = await resp.json();
                const container = document.getElementById('summaries');
                container.innerHTML = '';

                if (!data.length) {
                    container.innerHTML = '<p style="color: var(--ei-muted);">No briefings yet. Check back after the first broadcast!</p>';
                    return;
                }

                data.forEach(entry => {
                    const card = document.createElement('div');
                    card.className = 'summary-card';

                    const title = entry.episode_title || `Episode ${entry.episode_num || '?'}`;
                    const date = entry.date || '';
                    const content = (entry.summary || '').substring(0, 2000);
                    const audioUrl = entry.audio_url || '';

                    card.innerHTML = `
                        <h2>${title}</h2>
                        <div class="date">${date}</div>
                        <div class="content">${content}${entry.summary && entry.summary.length > 2000 ? '\n\n[Truncated — listen to full episode]' : ''}</div>
                        ${audioUrl ? `<audio controls preload="none" src="${audioUrl}"></audio>` : ''}
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('loading').textContent = 'No briefings yet. Check back after the first broadcast!';
            }
        }

        loadSummaries();
    </script>
</body>
</html>
