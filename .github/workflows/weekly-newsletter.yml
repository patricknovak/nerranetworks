name: Weekly Newsletters

on:
  schedule:
    # Sunday at 2 PM UTC
    - cron: '0 14 * * 0'

  workflow_dispatch:
    inputs:
      show:
        description: 'Show to generate newsletter for (default: all)'
        required: false
        type: choice
        options:
          - all
          - tesla
          - omni_view
          - fascinating_frontiers
          - planetterrian
          - env_intel
          - models_agents
          - models_agents_beginners
          - finansy_prosto
          - privet_russian
      dry_run:
        description: 'Generate but do not send'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Run weekly newsletters
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.show }}" != "" ] && [ "${{ github.event.inputs.show }}" != "all" ]; then
            ARGS="--show ${{ github.event.inputs.show }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/run_weekly_newsletters.py $ARGS

      - name: Commit newsletters
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/newsletters/
          git diff --cached --quiet || git commit -m "Add weekly newsletters for $(date -I)"
          git push
