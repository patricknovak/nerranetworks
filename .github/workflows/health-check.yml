name: RSS Health Check

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check RSS feed freshness
        shell: python3 {0}
        run: |
          import xml.etree.ElementTree as ET
          from email.utils import parsedate_to_datetime
          from datetime import datetime, timezone, timedelta

          # Staleness thresholds account for each show's schedule:
          # - Daily shows: 48h (miss one day = alert)
          # - Odd/even day shows: 96h (two-day gap + buffer for skip days)
          # - Weekday-only shows: 120h (Friday → Monday = 72h + buffer)
          FEEDS = {
              "podcast.rss": ("Tesla Shorts Time", 48),
              "omni_view_podcast.rss": ("Omni View", 96),
              "fascinating_frontiers_podcast.rss": ("Fascinating Frontiers", 96),
              "planetterrian_podcast.rss": ("Planetterrian Daily", 96),
              "env_intel_podcast.rss": ("Environmental Intelligence", 120),
              "models_agents_podcast.rss": ("Models & Agents", 96),
              "models_agents_beginners_podcast.rss": ("Models & Agents for Beginners", 96),
              "finansy_prosto_podcast.rss": ("Finansy Prosto", 96),
              "privet_russian_podcast.rss": ("Privet Russian", 96),
              "modern_investing_podcast.rss": ("Modern Investing", 120),
          }

          now = datetime.now(timezone.utc)
          stale = []

          for rss_file, (name, max_hours) in FEEDS.items():
              try:
                  tree = ET.parse(rss_file)
                  root = tree.getroot()
                  items = root.findall(".//item")
                  if not items:
                      stale.append(f"  - **{name}** (`{rss_file}`): No episodes found")
                      continue

                  dates = []
                  for item in items:
                      pub = item.find("pubDate")
                      if pub is not None and pub.text:
                          try:
                              dates.append(parsedate_to_datetime(pub.text))
                          except Exception:
                              pass

                  if not dates:
                      stale.append(f"  - **{name}** (`{rss_file}`): No valid pubDate found")
                      continue

                  latest = max(dates)
                  age = now - latest
                  age_hours = age.total_seconds() / 3600

                  if age_hours > max_hours:
                      stale.append(
                          f"  - **{name}** (`{rss_file}`): Last episode {age.days}d {age.seconds//3600}h ago "
                          f"(threshold: {max_hours}h)"
                      )
                  else:
                      print(f"OK: {name} — last episode {age_hours:.1f}h ago (limit: {max_hours}h)")

              except FileNotFoundError:
                  stale.append(f"  - **{name}** (`{rss_file}`): File not found")
              except Exception as e:
                  stale.append(f"  - **{name}** (`{rss_file}`): Parse error: {e}")

          if stale:
              body = "The following RSS feeds are stale:\\n\\n" + "\\n".join(stale)
              print(f"::error::STALE FEEDS DETECTED")
              print(body)

              # Write issue body for next step
              with open("issue_body.txt", "w") as f:
                  f.write("The following RSS feeds are stale:\n\n")
                  f.write("\n".join(s.replace("**", "") for s in stale))
                  f.write("\n\nThis may indicate a pipeline failure.")

              with open("has_stale", "w") as f:
                  f.write("true")
          else:
              print("All feeds are fresh.")
              with open("has_stale", "w") as f:
                  f.write("false")

      - name: Create issue if stale
        if: always()
        run: |
          if [ -f has_stale ] && [ "$(cat has_stale)" = "true" ]; then
            gh issue create \
              --title "RSS Health Check: Stale feeds detected $(date +%Y-%m-%d)" \
              --body-file issue_body.txt \
              --label "bug"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
