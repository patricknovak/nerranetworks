name: Omni View Daily

on:
  schedule:
    # Run daily at 6:00 AM EDT (10:00 UTC)
    # This is 6:00 AM EDT / 3:00 AM PDT
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit and push files

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        if [ ! -f requirements.txt ]; then
          echo "❌ ERROR: requirements.txt not found!"
          exit 1
        fi
        pip install -r requirements.txt
        echo "Installed packages:"
        pip list | grep -E "(openai|yfinance|tweepy|requests|python-dotenv|feedparser|torch|torchaudio|chatterbox)" || echo "Some packages may not be listed"

    - name: Create .env file from secrets
      run: |
        echo "Creating .env file..."
        cat > .env << EOF
        GROK_API_KEY=${{ secrets.GROK_API_KEY }}
        ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
        X_CONSUMER_KEY=${{ secrets.X_CONSUMER_KEY }}
        X_CONSUMER_SECRET=${{ secrets.X_CONSUMER_SECRET }}
        X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}
        X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}
        X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}
        EOF
        echo ".env file created (checking if keys are set)..."
        if [ -z "${{ secrets.GROK_API_KEY }}" ]; then
          echo "⚠️  WARNING: GROK_API_KEY is not set!"
        else
          echo "✅ GROK_API_KEY is set"
        fi
        if [ -z "${{ secrets.ELEVENLABS_API_KEY }}" ]; then
          echo "⚠️  WARNING: ELEVENLABS_API_KEY is not set!"
        else
          echo "✅ ELEVENLABS_API_KEY is set"
        fi
        echo "Checking X API credentials..."
        if [ -z "${{ secrets.X_CONSUMER_KEY }}" ]; then
          echo "❌ ERROR: X_CONSUMER_KEY is not set!"
        else
          echo "✅ X_CONSUMER_KEY is set"
        fi
        if [ -z "${{ secrets.X_CONSUMER_SECRET }}" ]; then
          echo "❌ ERROR: X_CONSUMER_SECRET is not set!"
        else
          echo "✅ X_CONSUMER_SECRET is set"
        fi
        if [ -z "${{ secrets.X_ACCESS_TOKEN }}" ]; then
          echo "❌ ERROR: X_ACCESS_TOKEN is not set!"
        else
          echo "✅ X_ACCESS_TOKEN is set"
        fi
        if [ -z "${{ secrets.X_ACCESS_TOKEN_SECRET }}" ]; then
          echo "❌ ERROR: X_ACCESS_TOKEN_SECRET is not set!"
        else
          echo "✅ X_ACCESS_TOKEN_SECRET is set"
        fi
        if [ -z "${{ secrets.X_BEARER_TOKEN }}" ]; then
          echo "⚠️  WARNING: X_BEARER_TOKEN is not set (optional but recommended)"
        else
          echo "✅ X_BEARER_TOKEN is set"
        fi

    - name: Run Omni View script
      working-directory: ./digests
      run: |
        set -e  # Exit on any error
        echo "Current directory: $(pwd)"
        echo "Checking for script file..."
        if [ ! -f omni_view.py ]; then
          echo "❌ ERROR: Script not found!"
          exit 1
        fi
        echo "✅ Script found"
        echo "Checking for .env file..."
        if [ ! -f ../.env ]; then
          echo "❌ ERROR: .env not found in parent directory!"
          exit 1
        fi
        echo "✅ .env file found"
        echo "Running Omni View script..."
        python3 omni_view.py 2>&1
      env:
        # Pass through any additional environment variables if needed
        TZ: UTC
      continue-on-error: false

    - name: List generated files
      run: |
        echo "Checking for generated files..."
        echo "Files in digests/:"
        ls -lah digests/Omni_View_*.md digests/Omni_View_Ep*.mp3 digests/podcast_transcript_*.txt 2>/dev/null || echo "No Omni View files found in digests/"
        echo "Raw data files in digests/:"
        ls -lah digests/raw_data_*.json digests/raw_data_*.html 2>/dev/null || echo "No raw data files found in digests/"
        echo "Credit usage files in digests/:"
        ls -lah digests/credit_usage_*.json 2>/dev/null || echo "No credit usage files found in digests/"
        echo "RSS feed file:"
        ls -lah omni_view_podcast.rss 2>/dev/null || echo "RSS feed file not found"

    - name: Commit and push generated files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        echo "📦 Staging all Omni View generated files..."

        # Add Omni View digest (X thread)
        git add digests/Omni_View_*.md 2>/dev/null || true

        # Add podcast audio files
        git add digests/Omni_View_Ep*.mp3 2>/dev/null || true

        # Add podcast transcript
        git add digests/podcast_transcript_*.txt 2>/dev/null || true

        # Add raw data files (JSON and HTML)
        git add digests/raw_data_*.json digests/raw_data_*.html 2>/dev/null || true

        # Add credit usage files (cost tracking)
        git add digests/credit_usage_*.json 2>/dev/null || true

        # Add GitHub Pages summary files
        git add digests/summaries_omni.json omni-view-summaries.html 2>/dev/null || true

        # ALWAYS add RSS feed file (even if it was just updated, not new)
        git add omni_view_podcast.rss 2>/dev/null || true

        echo "📋 Staged files:"
        git diff --staged --name-only || echo "No files staged"

        # Check if RSS feed has changes (even if not staged, it might have been modified)
        if git diff --name-only | grep -q "omni_view_podcast.rss" || git diff --staged --name-only | grep -q "omni_view_podcast.rss"; then
          echo "📡 RSS feed has changes - will be committed"
        fi

        # Check if there are any changes to commit
        if ! git diff --staged --quiet; then
          echo "💾 Committing files..."
          git commit -m "Auto-generated: Omni View $(date +%Y-%m-%d)" || echo "Commit failed (may be empty)"

          echo "🚀 Pushing to repository..."
          git push || echo "Push failed"

          echo "✅ Files committed and pushed successfully to repository!"
          echo ""
          echo "📊 Summary of what was generated:"
          echo "  ✓ Balanced news digest (X thread)"
          echo "  ✓ Posted to X (@omniviewnews)"
          echo "  ✓ Podcast script generated"
          echo "  ✓ Podcast audio created (ElevenLabs TTS)"
          echo "  ✓ RSS feed updated"
          echo "  ✓ Credit usage file generated"
          echo "  ✓ Summary saved to GitHub Pages"
        else
          echo "⚠️  No new files to commit - script may have failed or no new content generated"
        fi
      continue-on-error: true  # Don't fail workflow if commit/push fails