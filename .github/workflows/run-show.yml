name: Run Podcast Show

on:
  schedule:
    # All shows scheduled to finish before 7 AM Eastern (~11 UTC EDT / 12 UTC EST).
    # Pipeline takes up to 45 min, so all triggers fire by 9:30 UTC.
    # Staggered by 30 min to spread GitHub Actions load.
    #
    # Привет, Русский!: Even days at 5:00 UTC
    - cron: '0 5 2-31/2 * *'
    # Omni View: Odd days at 5:30 UTC
    - cron: '30 5 1-31/2 * *'
    # Planetterrian Daily: Odd days at 6:00 UTC
    - cron: '0 6 1-31/2 * *'
    # Fascinating Frontiers: Even days at 6:30 UTC
    - cron: '30 6 2-31/2 * *'
    # Environmental Intelligence: Odd weekdays at 7:00 UTC
    - cron: '0 7 1-31/2 * 1-5'
    # Models & Agents: Odd days at 7:30 UTC
    - cron: '30 7 1-31/2 * *'
    # Models & Agents for Beginners: Even days at 8:00 UTC
    - cron: '0 8 2-31/2 * *'
    # Финансы Просто: Even days at 8:30 UTC
    - cron: '30 8 2-31/2 * *'
    # Modern Investing Techniques: Weekdays at 9:00 UTC (before US market open)
    - cron: '0 9 * * 1-5'
    # Tesla Shorts Time: Daily at 9:30 UTC — last to get freshest news
    - cron: '30 9 * * *'

  workflow_dispatch:
    inputs:
      show:
        description: 'Show to run'
        required: true
        type: choice
        options:
          - tesla
          - omni_view
          - fascinating_frontiers
          - planetterrian
          - env_intel
          - models_agents
          - models_agents_beginners
          - finansy_prosto
          - privet_russian
          - modern_investing
          - all

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # Gate job: determine which show(s) to run based on cron time or dispatch
  # -----------------------------------------------------------------------
  gate:
    runs-on: ubuntu-latest
    outputs:
      shows: ${{ steps.resolve.outputs.shows }}
      known_noop: ${{ steps.resolve.outputs.known_noop }}
    steps:
      - name: Determine shows to run
        id: resolve
        shell: python3 {0}
        run: |
          import json, os, datetime

          dispatch_show = "${{ github.event.inputs.show }}" or ""
          event_name = "${{ github.event_name }}"
          known_noop = False

          if event_name == "workflow_dispatch":
              if dispatch_show == "all":
                  shows = ["tesla", "omni_view", "fascinating_frontiers", "planetterrian", "env_intel", "models_agents", "models_agents_beginners", "finansy_prosto", "privet_russian", "modern_investing"]
              else:
                  shows = [dispatch_show]
          else:
              # Scheduled: use github.event.schedule to deterministically identify
              # which cron expression triggered this run.  This is immune to GitHub
              # Actions cron delays (which previously caused shows to miss their
              # wall-clock time window).
              event_schedule = "${{ github.event.schedule }}" or ""
              now_utc = datetime.datetime.now(datetime.timezone.utc)
              day = now_utc.day
              weekday = now_utc.weekday()  # 0=Mon .. 6=Sun
              is_odd_day = day % 2 == 1
              is_even_day = day % 2 == 0

              # Map each cron expression to (show_slug, day_filter).
              # day_filter: "even" = even days only, "odd" = odd days only,
              #             "odd_weekday" = odd days AND weekdays,
              #             "weekday" = weekdays only, None = always run.
              # GitHub Actions cron uses OR logic for day-of-month + day-of-week,
              # so some crons fire more often than intended.  The day_filter
              # applies the intended restriction.
              CRON_MAP = {
                  "0 5 2-31/2 * *":   ("privet_russian",          "even"),
                  "30 5 1-31/2 * *":  ("omni_view",               "odd"),
                  "0 6 1-31/2 * *":   ("planetterrian",           "odd"),
                  "30 6 2-31/2 * *":  ("fascinating_frontiers",   "even"),
                  "0 7 1-31/2 * 1-5": ("env_intel",               "odd_weekday"),
                  "30 7 1-31/2 * *":  ("models_agents",           "odd"),
                  "0 8 2-31/2 * *":   ("models_agents_beginners", "even"),
                  "30 8 2-31/2 * *":  ("finansy_prosto",          "even"),
                  "0 9 * * 1-5":      ("modern_investing",        "weekday"),
                  "30 9 * * *":       ("tesla",                    None),
              }

              shows = []
              entry = CRON_MAP.get(event_schedule)

              if entry:
                  show_slug, day_filter = entry
                  run_today = True

                  if day_filter == "even" and not is_even_day:
                      run_today = False
                      known_noop = True
                      print(f"Even-day no-op: {show_slug} doesn't run on odd day {day}.")
                  elif day_filter == "odd" and not is_odd_day:
                      run_today = False
                      known_noop = True
                      print(f"Odd-day no-op: {show_slug} doesn't run on even day {day}.")
                  elif day_filter == "odd_weekday":
                      if not is_odd_day:
                          run_today = False
                          known_noop = True
                          print(f"Odd-day no-op: {show_slug} doesn't run on even day {day}.")
                      elif weekday >= 5:
                          run_today = False
                          known_noop = True
                          print(f"Weekend no-op: {show_slug} only runs on weekdays.")
                  elif day_filter == "weekday" and weekday >= 5:
                      run_today = False
                      known_noop = True
                      print(f"Weekend no-op: {show_slug} only runs on weekdays.")

                  if run_today:
                      shows.append(show_slug)
              else:
                  msg = f"WARNING: Unknown cron expression '{event_schedule}' — no show matched"
                  print(msg)
                  print(f"::warning::{msg}")

          matrix = json.dumps(shows)
          print(f"Shows to run: {matrix}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"shows={matrix}\n")
              f.write(f"known_noop={'true' if known_noop else 'false'}\n")

  # -----------------------------------------------------------------------
  # Alert if no shows were scheduled (catch misconfiguration / DST issues)
  # -----------------------------------------------------------------------
  alert-skip:
    needs: gate
    if: needs.gate.outputs.shows == '[]' && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Alert on skipped schedule
        run: |
          if [ "${{ needs.gate.outputs.known_noop }}" = "true" ]; then
            echo "DST no-op: cron fired at a UTC hour that only applies during the other DST state."
            echo "The affected show will run at its alternate UTC trigger instead."
            echo "UTC time: $(date -u)"
            exit 0
          fi
          echo "::error::SCHEDULE SKIP: No shows were matched for this cron trigger."
          echo "This may indicate a cron misconfiguration or DST edge case."
          echo "UTC time: $(date -u)"
          echo "Shows output: ${{ needs.gate.outputs.shows }}"
          # Exit with failure to surface in workflow dashboard
          exit 1

  # -----------------------------------------------------------------------
  # Run show(s) in parallel via matrix
  # -----------------------------------------------------------------------
  run:
    needs: gate
    if: needs.gate.outputs.shows != '[]'
    runs-on: ubuntu-latest
    concurrency:
      group: show-${{ matrix.show }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        show: ${{ fromJson(needs.gate.outputs.shows) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Show-specific extras
          if [ "${{ matrix.show }}" = "fascinating_frontiers" ] && [ -f requirements_fascinating_frontiers.txt ]; then
            pip install -r requirements_fascinating_frontiers.txt
          fi
          if [ "${{ matrix.show }}" = "planetterrian" ] && [ -f requirements_planetterrian.txt ]; then
            pip install -r requirements_planetterrian.txt
          fi

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short

      - name: Create .env
        run: |
          cat > .env <<'ENVEOF'
          GROK_API_KEY=${{ secrets.GROK_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          X_CONSUMER_KEY=${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET=${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}
          PLANETTERRIAN_X_CONSUMER_KEY=${{ secrets.PLANETTERRIAN_X_CONSUMER_KEY }}
          PLANETTERRIAN_X_CONSUMER_SECRET=${{ secrets.PLANETTERRIAN_X_CONSUMER_SECRET }}
          PLANETTERRIAN_X_ACCESS_TOKEN=${{ secrets.PLANETTERRIAN_X_ACCESS_TOKEN }}
          PLANETTERRIAN_X_ACCESS_TOKEN_SECRET=${{ secrets.PLANETTERRIAN_X_ACCESS_TOKEN_SECRET }}
          PLANETTERRIAN_X_BEARER_TOKEN=${{ secrets.PLANETTERRIAN_X_BEARER_TOKEN }}
          OMNI_VIEW_NEWSLETTER_API_KEY=${{ secrets.OMNI_VIEW_NEWSLETTER_API_KEY }}
          ENVIRONMENTAL_INTELLIGENCE_NEWSLETTER_API_KEY=${{ secrets.ENVIRONMENTAL_INTELLIGENCE_NEWSLETTER_API_KEY }}
          MODELS_AGENTS_NEWSLETTER_API_KEY=${{ secrets.MODELS_AGENTS_NEWSLETTER_API_KEY }}
          TESLA_NEWSLETTER_API_KEY=${{ secrets.TESLA_NEWSLETTER_API_KEY }}
          FASCINATING_FRONTIERS_NEWSLETTER_API_KEY=${{ secrets.FASCINATING_FRONTIERS_NEWSLETTER_API_KEY }}
          PLANETTERRIAN_NEWSLETTER_API_KEY=${{ secrets.PLANETTERRIAN_NEWSLETTER_API_KEY }}
          FINANSY_PROSTO_NEWSLETTER_API_KEY=${{ secrets.FINANSY_PROSTO_NEWSLETTER_API_KEY }}
          MODERN_INVESTING_NEWSLETTER_API_KEY=${{ secrets.MODERN_INVESTING_NEWSLETTER_API_KEY }}
          PRIVET_RUSSIAN_NEWSLETTER_API_KEY=${{ secrets.PRIVET_RUSSIAN_NEWSLETTER_API_KEY }}
          FISH_AUDIO_API_KEY=${{ secrets.FISH_AUDIO_API_KEY }}
          ENVEOF
          # Strip leading whitespace from heredoc lines (YAML indentation artifact)
          sed -i 's/^[[:space:]]*//' .env

      - name: Validate config before run
        run: |
          python3 -c "
          from engine.config import load_config
          config = load_config('shows/${{ matrix.show }}.yaml')
          assert config.name, 'Show name is empty'
          assert config.llm.digest_prompt_file, 'Missing digest prompt file'
          assert config.llm.podcast_prompt_file, 'Missing podcast prompt file'
          from pathlib import Path
          assert Path(config.llm.digest_prompt_file).exists(), f'Digest prompt not found: {config.llm.digest_prompt_file}'
          assert Path(config.llm.podcast_prompt_file).exists(), f'Podcast prompt not found: {config.llm.podcast_prompt_file}'
          if config.llm.system_prompt_file:
              assert Path(config.llm.system_prompt_file).exists(), f'System prompt not found: {config.llm.system_prompt_file}'
          assert len(config.sources) > 0, 'No RSS sources configured'
          print(f'Config validated: {config.name} ({len(config.sources)} sources, model={config.llm.model})')
          "

      - name: Run show pipeline
        id: pipeline
        run: |
          set +e
          python run_show.py ${{ matrix.show }} 2>&1
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 2 ]; then
            echo "::warning::Show ${{ matrix.show }} skipped — insufficient articles for a quality episode"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit $EXIT_CODE
        timeout-minutes: 45
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PIPELINE_TIMEOUT_SECONDS: '900'

      - name: Validate output
        if: steps.pipeline.outputs.skipped != 'true'
        run: |
          SHOW="${{ matrix.show }}"
          echo "Validating output for $SHOW..."

          # Determine output directory
          OUTPUT_DIR="digests/${SHOW}"
          if [ "$SHOW" = "tesla" ]; then
            OUTPUT_DIR="digests/tesla_shorts_time"
          fi

          # Check that at least one .md digest file was created today
          TODAY=$(date +%Y%m%d)
          MD_COUNT=$(find "$OUTPUT_DIR" -name "*${TODAY}*.md" -type f 2>/dev/null | wc -l)
          if [ "$MD_COUNT" -eq 0 ]; then
            echo "WARNING: No digest markdown found for today in $OUTPUT_DIR"
          else
            echo "Found $MD_COUNT digest file(s) for today"
          fi

          # Check for MP3 output (skip for test-only runs)
          MP3_COUNT=$(find "$OUTPUT_DIR" -name "*${TODAY}*.mp3" -not -name "*_raw.mp3" -type f 2>/dev/null | wc -l)
          if [ "$MP3_COUNT" -eq 0 ]; then
            echo "WARNING: No final MP3 found for today in $OUTPUT_DIR"
          else
            # Validate MP3 is reasonable size (> 100KB = not empty/corrupt)
            for mp3 in $(find "$OUTPUT_DIR" -name "*${TODAY}*.mp3" -not -name "*_raw.mp3" -type f 2>/dev/null); do
              SIZE=$(stat -c%s "$mp3" 2>/dev/null || echo 0)
              if [ "$SIZE" -lt 100000 ]; then
                echo "ERROR: MP3 $mp3 is suspiciously small (${SIZE} bytes)"
                exit 1
              fi
              echo "MP3 validated: $mp3 (${SIZE} bytes)"
            done
          fi

          # Check digest content for LLM refusal text
          python3 -c "
          import re, pathlib, sys
          output_dir = '$OUTPUT_DIR'
          today = '$(date +%Y%m%d)'
          md_files = list(pathlib.Path(output_dir).glob(f'*{today}*.md'))
          REFUSAL_RE = re.compile(r'(?i)\bI\s+(?:cannot|can[\x27\u2019]t)\s+(?:create|generate|produce|write)\b')
          for f in md_files:
              text = f.read_text()[:2000]
              if REFUSAL_RE.search(text):
                  print(f'ERROR: Digest {f.name} contains LLM refusal text')
                  sys.exit(1)
              if len(text.strip()) < 200:
                  print(f'ERROR: Digest {f.name} is suspiciously short ({len(text.strip())} chars)')
                  sys.exit(1)
          print(f'Digest content validated ({len(md_files)} file(s))')
          "

          # Validate RSS feed is well-formed XML
          RSS_FILES=$(find . -maxdepth 1 -name "*.rss" -newer "$OUTPUT_DIR" -type f 2>/dev/null || true)
          for rss in *.rss; do
            if [ -f "$rss" ]; then
              python3 -c "import xml.etree.ElementTree as ET; ET.parse('$rss'); print('RSS valid: $rss')" || {
                echo "ERROR: RSS feed $rss is not valid XML"
                exit 1
              }
            fi
          done

          echo "Output validation passed"

      - name: Regenerate network RSS
        if: steps.pipeline.outputs.skipped != 'true'
        run: python generate_network_rss.py

      - name: Regenerate show HTML pages
        if: steps.pipeline.outputs.skipped != 'true'
        run: |
          # Regenerate show page (static episodes) + blog posts for this show
          python generate_html.py --show ${{ matrix.show }} --blogs

      - name: Notify podcast directories
        if: success() && steps.pipeline.outputs.skipped != 'true'
        env:
          RSS_BASE_URL: https://nerranetwork.com
        run: |
          python -c "
          from engine.publisher import notify_directories
          import yaml, pathlib

          show = '${{ matrix.show }}'
          cfg_path = pathlib.Path('shows') / f'{show}.yaml'
          if cfg_path.exists():
              cfg = yaml.safe_load(cfg_path.read_text())
              rss_file = cfg.get('publishing', {}).get('rss_file', '')
              rss_title = cfg.get('publishing', {}).get('rss_title', show)
              if rss_file:
                  rss_url = f'${{ env.RSS_BASE_URL }}/{rss_file}'
                  notify_directories(rss_url, rss_title)
          "

      - name: Commit and push output
        if: steps.pipeline.outputs.skipped != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Stage all generated output
          git add -A digests/ || true
          git add *.rss || true
          git add *.html || true
          git add -A blog/ || true
          git add sitemap.xml || true

          # Exclude MP3 files (hosted on R2, not in git)
          git reset HEAD -- '*.mp3' 2>/dev/null || true

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto-generated: ${{ matrix.show }} $(date +%Y-%m-%d)"

          # Push with retry (handles concurrent pushes from matrix jobs)
          for attempt in 1 2 3 4; do
            # Try rebase first (cleanest history)
            if git pull --rebase origin main; then
              if git push origin main; then
                echo "Push succeeded on attempt $attempt (rebase)"
                exit 0
              fi
            else
              # Rebase failed (likely conflict) — abort and try merge
              git rebase --abort 2>/dev/null || true
              echo "Rebase failed on attempt $attempt, trying merge..."
              if git pull --no-rebase origin main -X theirs; then
                if git push origin main; then
                  echo "Push succeeded on attempt $attempt (merge)"
                  exit 0
                fi
              else
                echo "Merge also failed on attempt $attempt"
              fi
            fi
            echo "Push failed on attempt $attempt, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "All push attempts failed"
          exit 1

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::PIPELINE FAILURE: ${{ matrix.show }} failed on $(date -u +%Y-%m-%d)"
          echo "Check the workflow logs for details."
          echo "Show: ${{ matrix.show }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Notify on failure (webhook)
        if: failure() && env.NOTIFICATION_WEBHOOK_URL != ''
        env:
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$NOTIFICATION_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Pipeline FAILED: ${{ matrix.show }} on $(date -u +%Y-%m-%d). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            || echo "Webhook notification failed (non-blocking)"

  # -----------------------------------------------------------------------
  # Finalize: regenerate shared pages after all show jobs have completed
  # -----------------------------------------------------------------------
  # Each show job commits its own blog posts, show page, and RSS.  But the
  # network homepage (index.html), network blog index (blog/index.html), and
  # sitemap.xml aggregate data from ALL shows.  Generating them inside each
  # matrix job causes a race condition: the last job to push overwrites the
  # others, losing their updates to the shared pages.
  #
  # This finalize job runs once after all matrix jobs are done.  It pulls
  # the latest main (with every show's committed data), regenerates the
  # shared pages with the complete dataset, and pushes a single commit.
  # -----------------------------------------------------------------------
  finalize:
    needs: run
    if: always() && needs.run.result != 'skipped'
    runs-on: ubuntu-latest
    concurrency:
      group: finalize-shared-pages
      cancel-in-progress: false
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pull latest changes from all show jobs
        run: git pull origin main

      - name: Regenerate shared pages
        run: |
          # Network homepage (latest episodes + blog posts from all shows)
          # Network-wide blog index (aggregates all shows' posts)
          # Sitemap with all pages
          python generate_html.py --network --blogs --sitemap

      - name: Commit and push shared pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add index.html || true
          git add blog/index.html || true
          git add sitemap.xml || true

          if git diff --cached --quiet; then
            echo "Shared pages are already up to date."
            exit 0
          fi

          git commit -m "Update shared pages (network index, blog index, sitemap) $(date +%Y-%m-%d)"

          for attempt in 1 2 3 4; do
            if git pull --rebase origin main && git push origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt, retrying in $((attempt * 2))s..."
            sleep $((attempt * 2))
          done
          echo "All push attempts failed"
          exit 1
