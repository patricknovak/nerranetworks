name: Run Podcast Show

on:
  schedule:
    # Tesla Shorts Time: Daily ~7 AM Eastern
    - cron: '0 11 * * *'
    # Omni View: Odd days ~6 AM Eastern (EDT trigger)
    - cron: '0 10 1-31/2 * *'
    # Omni View: Odd days ~6 AM Eastern (EST fallback — runs at 11 UTC)
    - cron: '0 11 1-31/2 * *'
    # Planetterrian Daily: Odd days ~8 AM Eastern
    - cron: '0 12 1-31/2 * *'
    # Fascinating Frontiers: Even days ~8:15 AM Eastern
    - cron: '15 12 2-31/2 * *'
    # Environmental Intelligence: Odd weekdays ~6 AM Pacific (14:00 UTC)
    - cron: '0 14 1-31/2 * 1-5'
    # Models & Agents: Odd days ~7 AM Pacific (15:00 UTC)
    - cron: '0 15 1-31/2 * *'
    # Models & Agents for Beginners: Even days ~8 AM Pacific (16:00 UTC)
    - cron: '0 16 2-31/2 * *'
    # Финансы Просто: Even days ~9 AM Pacific (17:00 UTC)
    - cron: '0 17 2-31/2 * *'
    # Привет, Русский!: Even days ~10 AM Pacific (18:00 UTC)
    - cron: '0 18 2-31/2 * *'

  workflow_dispatch:
    inputs:
      show:
        description: 'Show to run'
        required: true
        type: choice
        options:
          - tesla
          - omni_view
          - fascinating_frontiers
          - planetterrian
          - env_intel
          - models_agents
          - models_agents_beginners
          - finansy_prosto
          - privet_russian
          - all

permissions:
  contents: write

jobs:
  # -----------------------------------------------------------------------
  # Gate job: determine which show(s) to run based on cron time or dispatch
  # -----------------------------------------------------------------------
  gate:
    runs-on: ubuntu-latest
    outputs:
      shows: ${{ steps.resolve.outputs.shows }}
      known_noop: ${{ steps.resolve.outputs.known_noop }}
    steps:
      - name: Determine shows to run
        id: resolve
        shell: python3 {0}
        run: |
          import json, os, datetime

          dispatch_show = "${{ github.event.inputs.show }}" or ""
          event_name = "${{ github.event_name }}"
          known_noop = False

          if event_name == "workflow_dispatch":
              if dispatch_show == "all":
                  shows = ["tesla", "omni_view", "fascinating_frontiers", "planetterrian", "env_intel", "models_agents", "models_agents_beginners", "finansy_prosto", "privet_russian"]
              else:
                  shows = [dispatch_show]
          else:
              # Scheduled: determine from UTC hour + Eastern time
              try:
                  from zoneinfo import ZoneInfo
              except ImportError:
                  from backports.zoneinfo import ZoneInfo

              now_utc = datetime.datetime.now(datetime.timezone.utc)
              now_et = now_utc.astimezone(ZoneInfo("America/New_York"))
              utc_hour = now_utc.hour
              utc_minute = now_utc.minute
              et_hour = now_et.hour
              day = now_et.day
              is_odd_day = day % 2 == 1
              is_even_day = day % 2 == 0

              shows = []

              # 10:00 UTC — Omni View on odd days if ET hour is 6 (EDT)
              if utc_hour == 10 and et_hour == 6 and is_odd_day:
                  shows.append("omni_view")
              # 11:00 UTC — Tesla always; Omni View on odd days if ET hour is 6 (EST fallback)
              elif utc_hour == 11:
                  shows.append("tesla")
                  if et_hour == 6 and is_odd_day:
                      shows.append("omni_view")
              # 12:00 UTC — odd day = Planetterrian; 12:15 UTC — even day = Fascinating Frontiers
              elif utc_hour == 12:
                  if utc_minute < 10 and is_odd_day:
                      shows.append("planetterrian")
                  elif utc_minute >= 10 and is_even_day:
                      shows.append("fascinating_frontiers")
              # 14:00 UTC — Environmental Intelligence (odd weekdays only)
              elif utc_hour == 14:
                  weekday = now_et.weekday()  # 0=Mon, 6=Sun
                  if weekday < 5 and is_odd_day:
                      shows.append("env_intel")
              # 15:00 UTC — Models & Agents (odd days only)
              elif utc_hour == 15:
                  if is_odd_day:
                      shows.append("models_agents")
              # 16:00 UTC — Models & Agents for Beginners (even days only)
              elif utc_hour == 16:
                  if is_even_day:
                      shows.append("models_agents_beginners")
              # 17:00 UTC — Финансы Просто (even days only)
              elif utc_hour == 17:
                  if is_even_day:
                      shows.append("finansy_prosto")
              # 18:00 UTC — Привет, Русский! (even days only)
              elif utc_hour == 18:
                  if is_even_day:
                      shows.append("privet_russian")

              # Detect known DST no-ops (cron fires but show runs at a different
              # UTC hour depending on EST/EDT).  These are expected empty results.
              if not shows:
                  # 10:00 UTC is the EDT-only Omni View trigger.
                  # During EST, Omni View runs at 11:00 UTC instead.
                  if utc_hour == 10 and et_hour != 6:
                      known_noop = True
                      print(f"DST no-op: 10:00 UTC Omni View trigger during EST (ET hour={et_hour}). "
                            f"Omni View will run at 11:00 UTC instead.")
                  # Odd/even day cron triggers on non-matching days are expected no-ops
                  elif utc_hour in (10, 12, 14, 15) and is_even_day:
                      known_noop = True
                      print(f"Even-day no-op: odd-day shows don't run on day {day}.")
                  elif utc_hour in (16, 17, 18) and is_odd_day:
                      known_noop = True
                      print(f"Odd-day no-op: even-day shows don't run on day {day}.")
                  else:
                      msg = f"WARNING: No shows matched for UTC {utc_hour}:{utc_minute:02d}, ET hour {et_hour}, day {day}"
                      print(msg)
                      print(f"::warning::{msg}")

          matrix = json.dumps(shows)
          print(f"Shows to run: {matrix}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"shows={matrix}\n")
              f.write(f"known_noop={'true' if known_noop else 'false'}\n")

  # -----------------------------------------------------------------------
  # Alert if no shows were scheduled (catch misconfiguration / DST issues)
  # -----------------------------------------------------------------------
  alert-skip:
    needs: gate
    if: needs.gate.outputs.shows == '[]' && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Alert on skipped schedule
        run: |
          if [ "${{ needs.gate.outputs.known_noop }}" = "true" ]; then
            echo "DST no-op: cron fired at a UTC hour that only applies during the other DST state."
            echo "The affected show will run at its alternate UTC trigger instead."
            echo "UTC time: $(date -u)"
            exit 0
          fi
          echo "::error::SCHEDULE SKIP: No shows were matched for this cron trigger."
          echo "This may indicate a cron misconfiguration or DST edge case."
          echo "UTC time: $(date -u)"
          echo "Shows output: ${{ needs.gate.outputs.shows }}"
          # Exit with failure to surface in workflow dashboard
          exit 1

  # -----------------------------------------------------------------------
  # Run show(s) in parallel via matrix
  # -----------------------------------------------------------------------
  run:
    needs: gate
    if: needs.gate.outputs.shows != '[]'
    runs-on: ubuntu-latest
    concurrency:
      group: show-${{ matrix.show }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        show: ${{ fromJson(needs.gate.outputs.shows) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Show-specific extras
          if [ "${{ matrix.show }}" = "fascinating_frontiers" ] && [ -f requirements_fascinating_frontiers.txt ]; then
            pip install -r requirements_fascinating_frontiers.txt
          fi
          if [ "${{ matrix.show }}" = "planetterrian" ] && [ -f requirements_planetterrian.txt ]; then
            pip install -r requirements_planetterrian.txt
          fi

      - name: Run tests
        run: python -m pytest tests/ -x -q --tb=short

      - name: Create .env
        run: |
          cat > .env <<'ENVEOF'
          GROK_API_KEY=${{ secrets.GROK_API_KEY }}
          ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          X_CONSUMER_KEY=${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET=${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}
          PLANETTERRIAN_X_CONSUMER_KEY=${{ secrets.PLANETTERRIAN_X_CONSUMER_KEY }}
          PLANETTERRIAN_X_CONSUMER_SECRET=${{ secrets.PLANETTERRIAN_X_CONSUMER_SECRET }}
          PLANETTERRIAN_X_ACCESS_TOKEN=${{ secrets.PLANETTERRIAN_X_ACCESS_TOKEN }}
          PLANETTERRIAN_X_ACCESS_TOKEN_SECRET=${{ secrets.PLANETTERRIAN_X_ACCESS_TOKEN_SECRET }}
          PLANETTERRIAN_X_BEARER_TOKEN=${{ secrets.PLANETTERRIAN_X_BEARER_TOKEN }}
          OMNI_VIEW_NEWSLETTER_API_KEY=${{ secrets.OMNI_VIEW_NEWSLETTER_API_KEY }}
          ENV_INTEL_NEWSLETTER_API_KEY=${{ secrets.ENV_INTEL_NEWSLETTER_API_KEY }}
          MODELS_AGENTS_NEWSLETTER_API_KEY=${{ secrets.MODELS_AGENTS_NEWSLETTER_API_KEY }}
          FISH_AUDIO_API_KEY=${{ secrets.FISH_AUDIO_API_KEY }}
          ENVEOF
          # Strip leading whitespace from heredoc lines (YAML indentation artifact)
          sed -i 's/^[[:space:]]*//' .env

      - name: Validate config before run
        run: |
          python3 -c "
          from engine.config import load_config
          config = load_config('shows/${{ matrix.show }}.yaml')
          assert config.name, 'Show name is empty'
          assert config.llm.digest_prompt_file, 'Missing digest prompt file'
          assert config.llm.podcast_prompt_file, 'Missing podcast prompt file'
          from pathlib import Path
          assert Path(config.llm.digest_prompt_file).exists(), f'Digest prompt not found: {config.llm.digest_prompt_file}'
          assert Path(config.llm.podcast_prompt_file).exists(), f'Podcast prompt not found: {config.llm.podcast_prompt_file}'
          if config.llm.system_prompt_file:
              assert Path(config.llm.system_prompt_file).exists(), f'System prompt not found: {config.llm.system_prompt_file}'
          assert len(config.sources) > 0, 'No RSS sources configured'
          print(f'Config validated: {config.name} ({len(config.sources)} sources, model={config.llm.model})')
          "

      - name: Run show pipeline
        run: python run_show.py ${{ matrix.show }} 2>&1
        timeout-minutes: 45
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          PIPELINE_TIMEOUT_SECONDS: '900'

      - name: Validate output
        run: |
          SHOW="${{ matrix.show }}"
          echo "Validating output for $SHOW..."

          # Determine output directory
          OUTPUT_DIR="digests/${SHOW}"
          if [ "$SHOW" = "tesla" ]; then
            OUTPUT_DIR="digests/tesla_shorts_time"
          fi

          # Check that at least one .md digest file was created today
          TODAY=$(date +%Y%m%d)
          MD_COUNT=$(find "$OUTPUT_DIR" -name "*${TODAY}*.md" -type f 2>/dev/null | wc -l)
          if [ "$MD_COUNT" -eq 0 ]; then
            echo "WARNING: No digest markdown found for today in $OUTPUT_DIR"
          else
            echo "Found $MD_COUNT digest file(s) for today"
          fi

          # Check for MP3 output (skip for test-only runs)
          MP3_COUNT=$(find "$OUTPUT_DIR" -name "*${TODAY}*.mp3" -not -name "*_raw.mp3" -type f 2>/dev/null | wc -l)
          if [ "$MP3_COUNT" -eq 0 ]; then
            echo "WARNING: No final MP3 found for today in $OUTPUT_DIR"
          else
            # Validate MP3 is reasonable size (> 100KB = not empty/corrupt)
            for mp3 in $(find "$OUTPUT_DIR" -name "*${TODAY}*.mp3" -not -name "*_raw.mp3" -type f 2>/dev/null); do
              SIZE=$(stat -c%s "$mp3" 2>/dev/null || echo 0)
              if [ "$SIZE" -lt 100000 ]; then
                echo "ERROR: MP3 $mp3 is suspiciously small (${SIZE} bytes)"
                exit 1
              fi
              echo "MP3 validated: $mp3 (${SIZE} bytes)"
            done
          fi

          # Validate RSS feed is well-formed XML
          RSS_FILES=$(find . -maxdepth 1 -name "*.rss" -newer "$OUTPUT_DIR" -type f 2>/dev/null || true)
          for rss in *.rss; do
            if [ -f "$rss" ]; then
              python3 -c "import xml.etree.ElementTree as ET; ET.parse('$rss'); print('RSS valid: $rss')" || {
                echo "ERROR: RSS feed $rss is not valid XML"
                exit 1
              }
            fi
          done

          echo "Output validation passed"

      - name: Regenerate network RSS
        run: python generate_network_rss.py

      - name: Notify podcast directories
        if: success()
        env:
          RSS_BASE_URL: https://nerranetwork.com
        run: |
          python -c "
          from engine.publisher import notify_directories
          import yaml, pathlib

          show = '${{ matrix.show }}'
          cfg_path = pathlib.Path('shows') / f'{show}.yaml'
          if cfg_path.exists():
              cfg = yaml.safe_load(cfg_path.read_text())
              rss_file = cfg.get('publishing', {}).get('rss_file', '')
              rss_title = cfg.get('publishing', {}).get('rss_title', show)
              if rss_file:
                  rss_url = f'${{ env.RSS_BASE_URL }}/{rss_file}'
                  notify_directories(rss_url, rss_title)
          "

      - name: Commit and push output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Stage all generated output
          git add -A digests/ || true
          git add *.rss || true
          git add *.html || true

          # Exclude MP3 files (hosted on R2, not in git)
          git reset HEAD -- '*.mp3' 2>/dev/null || true

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto-generated: ${{ matrix.show }} $(date +%Y-%m-%d)"

          # Push with retry (handles concurrent pushes from matrix jobs)
          for attempt in 1 2 3 4; do
            # Try rebase first (cleanest history)
            if git pull --rebase origin main; then
              if git push origin main; then
                echo "Push succeeded on attempt $attempt (rebase)"
                exit 0
              fi
            else
              # Rebase failed (likely conflict) — abort and try merge
              git rebase --abort 2>/dev/null || true
              echo "Rebase failed on attempt $attempt, trying merge..."
              if git pull --no-rebase origin main -X theirs; then
                if git push origin main; then
                  echo "Push succeeded on attempt $attempt (merge)"
                  exit 0
                fi
              else
                echo "Merge also failed on attempt $attempt"
              fi
            fi
            echo "Push failed on attempt $attempt, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "All push attempts failed"
          exit 1

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::PIPELINE FAILURE: ${{ matrix.show }} failed on $(date -u +%Y-%m-%d)"
          echo "Check the workflow logs for details."
          echo "Show: ${{ matrix.show }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Notify on failure (webhook)
        if: failure() && env.NOTIFICATION_WEBHOOK_URL != ''
        env:
          NOTIFICATION_WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$NOTIFICATION_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Pipeline FAILED: ${{ matrix.show }} on $(date -u +%Y-%m-%d). Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            || echo "Webhook notification failed (non-blocking)"
