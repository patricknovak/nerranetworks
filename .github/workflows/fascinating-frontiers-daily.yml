name: Fascinating Frontiers Bi-Daily

on:
  schedule:
    # Run every other day (even-numbered days) at 8:00 AM EDT (12:00 UTC)
    # This is 8:00 AM EDT / 5:00 AM PDT
    # Cron: '0 12 2-31/2 * *' runs on 2nd, 4th, 6th, etc. of each month
    # Collects best news from last 48 hours (2 days)
    - cron: '0 12 2-31/2 * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit and push files
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements_fascinating_frontiers.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        if [ ! -f requirements_fascinating_frontiers.txt ]; then
          echo "❌ ERROR: requirements_fascinating_frontiers.txt not found!"
          exit 1
        fi
        pip install -r requirements_fascinating_frontiers.txt
        echo "Installed packages:"
        pip list | grep -E "(openai|tweepy|requests|python-dotenv|feedparser|torch|torchaudio|chatterbox)" || echo "Some packages may not be listed"
        
    - name: Create .env file from secrets
      run: |
        echo "Creating .env file..."
        cat > .env << EOF
        GROK_API_KEY=${{ secrets.GROK_API_KEY }}
        # TTS provider (elevenlabs uses ElevenLabs API with Patrick voice)
        FASCINATING_FRONTIERS_TTS_PROVIDER=elevenlabs
        CHATTERBOX_DEVICE=cpu
        CHATTERBOX_EXAGGERATION=0.5
        CHATTERBOX_MAX_CHARS=1000
        CHATTERBOX_QUIET=1
        # Optional: override voice prompt directly (otherwise derived from Planetterrian episodes)
        CHATTERBOX_VOICE_PROMPT_BASE64=${{ secrets.PLANETTERRIAN_VOICE_PROMPT_BASE64 }}
        # Optional fallback if you switch FASCINATING_FRONTIERS_TTS_PROVIDER back to elevenlabs
        ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
        PLANETTERRIAN_X_CONSUMER_KEY=${{ secrets.PLANETTERRIAN_X_CONSUMER_KEY }}
        PLANETTERRIAN_X_CONSUMER_SECRET=${{ secrets.PLANETTERRIAN_X_CONSUMER_SECRET }}
        PLANETTERRIAN_X_ACCESS_TOKEN=${{ secrets.PLANETTERRIAN_X_ACCESS_TOKEN }}
        PLANETTERRIAN_X_ACCESS_TOKEN_SECRET=${{ secrets.PLANETTERRIAN_X_ACCESS_TOKEN_SECRET }}
        PLANETTERRIAN_X_BEARER_TOKEN=${{ secrets.PLANETTERRIAN_X_BEARER_TOKEN }}
        EOF
        echo ".env file created (checking if keys are set)..."
        if [ -z "${{ secrets.GROK_API_KEY }}" ]; then
          echo "⚠️  WARNING: GROK_API_KEY is not set!"
        else
          echo "✅ GROK_API_KEY is set"
        fi
        # Chatterbox prompt secret is optional (we can derive it from Planetterrian episode MP3s in the repo)
        if [ -z "${{ secrets.PLANETTERRIAN_VOICE_PROMPT_BASE64 }}" ]; then
          echo "ℹ️  PLANETTERRIAN_VOICE_PROMPT_BASE64 is not set (optional). Will derive a voice prompt from the most recent Planetterrian episode MP3 in the repo."
        else
          echo "✅ PLANETTERRIAN_VOICE_PROMPT_BASE64 is set"
        fi
        if [ -z "${{ secrets.ELEVENLABS_API_KEY }}" ]; then
          echo "ℹ️  ELEVENLABS_API_KEY is not set (only needed if you switch back to ElevenLabs)"
        else
          echo "✅ ELEVENLABS_API_KEY is set (fallback)"
        fi
        echo "Checking Planetterrian X API credentials (Fascinating Frontiers uses same account)..."
        if [ -z "${{ secrets.PLANETTERRIAN_X_CONSUMER_KEY }}" ]; then
          echo "❌ ERROR: PLANETTERRIAN_X_CONSUMER_KEY is not set!"
        else
          echo "✅ PLANETTERRIAN_X_CONSUMER_KEY is set"
        fi
        if [ -z "${{ secrets.PLANETTERRIAN_X_CONSUMER_SECRET }}" ]; then
          echo "❌ ERROR: PLANETTERRIAN_X_CONSUMER_SECRET is not set!"
        else
          echo "✅ PLANETTERRIAN_X_CONSUMER_SECRET is set"
        fi
        if [ -z "${{ secrets.PLANETTERRIAN_X_ACCESS_TOKEN }}" ]; then
          echo "❌ ERROR: PLANETTERRIAN_X_ACCESS_TOKEN is not set!"
        else
          echo "✅ PLANETTERRIAN_X_ACCESS_TOKEN is set"
        fi
        if [ -z "${{ secrets.PLANETTERRIAN_X_ACCESS_TOKEN_SECRET }}" ]; then
          echo "❌ ERROR: PLANETTERRIAN_X_ACCESS_TOKEN_SECRET is not set!"
        else
          echo "✅ PLANETTERRIAN_X_ACCESS_TOKEN_SECRET is set"
        fi
        if [ -z "${{ secrets.PLANETTERRIAN_X_BEARER_TOKEN }}" ]; then
          echo "⚠️  WARNING: PLANETTERRIAN_X_BEARER_TOKEN is not set (optional but recommended)"
        else
          echo "✅ PLANETTERRIAN_X_BEARER_TOKEN is set"
        fi
        
    - name: Run Fascinating Frontiers script
      working-directory: ./digests
      run: |
        set -e  # Exit on any error
        echo "Current directory: $(pwd)"
        echo "Checking for script file..."
        if [ ! -f fascinating_frontiers.py ]; then
          echo "❌ ERROR: Script not found!"
          exit 1
        fi
        echo "✅ Script found"
        echo "Checking for .env file..."
        if [ ! -f ../.env ]; then
          echo "❌ ERROR: .env not found in parent directory!"
          exit 1
        fi
        echo "✅ .env file found"
        echo "Checking for Planetterrian episode MP3s (for voice prompt fallback)..."
        ls -lah ../digests/planetterrian/Planetterrian_Daily_Ep*.mp3 2>/dev/null | head -5 || echo "⚠️  No Planetterrian episode MP3s found. Provide CHATTERBOX_VOICE_PROMPT_BASE64 to avoid failure."
        echo "Running Fascinating Frontiers script..."
        python3 fascinating_frontiers.py 2>&1
      env:
        # Pass through any additional environment variables if needed
        TZ: UTC
      continue-on-error: false
        
    - name: List generated files
      run: |
        echo "Checking for generated files..."
        echo "Files in digests/fascinating_frontiers/:"
        ls -lah digests/fascinating_frontiers/Fascinating_Frontiers_*.md digests/fascinating_frontiers/Fascinating_Frontiers_Ep*.mp3 digests/fascinating_frontiers/podcast_transcript_*.txt 2>/dev/null || echo "No Fascinating Frontiers files found in digests/fascinating_frontiers/"
        echo "Raw data files in digests/fascinating_frontiers/:"
        ls -lah digests/fascinating_frontiers/raw_data_*.json digests/fascinating_frontiers/raw_data_*.html 2>/dev/null || echo "No raw data files found in digests/fascinating_frontiers/"
        echo "Credit usage files in digests/fascinating_frontiers/:"
        ls -lah digests/fascinating_frontiers/credit_usage_*.json 2>/dev/null || echo "No credit usage files found in digests/fascinating_frontiers/"
        echo "RSS feed file:"
        ls -lah fascinating_frontiers_podcast.rss 2>/dev/null || echo "RSS feed file not found"
        
    - name: Commit and push generated files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        echo "📦 Staging all Fascinating Frontiers generated files..."
        
        # Add Fascinating Frontiers digest (X thread)
        git add digests/fascinating_frontiers/Fascinating_Frontiers_*.md 2>/dev/null || true
        
        # Add podcast audio files
        git add digests/fascinating_frontiers/Fascinating_Frontiers_Ep*.mp3 2>/dev/null || true
        
        # Add podcast transcript
        git add digests/fascinating_frontiers/podcast_transcript_*.txt 2>/dev/null || true
        
        # Add raw data files (JSON and HTML)
        git add digests/fascinating_frontiers/raw_data_*.json digests/fascinating_frontiers/raw_data_*.html 2>/dev/null || true
        
        # Add credit usage files (cost tracking)
        git add digests/fascinating_frontiers/credit_usage_*.json 2>/dev/null || true
        
        # ALWAYS add RSS feed file (even if it was just updated, not new)
        git add fascinating_frontiers_podcast.rss 2>/dev/null || true

        # Add HTML page if it exists
        git add fascinating_frontiers.html 2>/dev/null || true

        # Add Fascinating Frontiers summaries page + JSON (only FF content)
        git add fascinating-frontiers-summaries.html digests/summaries_space.json 2>/dev/null || true
        
        echo "📋 Staged files:"
        git diff --staged --name-only || echo "No files staged"
        
        # Check if RSS feed has changes (even if not staged, it might have been modified)
        if git diff --name-only | grep -q "fascinating_frontiers_podcast.rss" || git diff --staged --name-only | grep -q "fascinating_frontiers_podcast.rss"; then
          echo "📡 RSS feed has changes - will be committed"
        fi
        
        # Check if there are any changes to commit
        if ! git diff --staged --quiet || ! git diff --quiet fascinating_frontiers_podcast.rss; then
          # If RSS feed has changes but isn't staged, stage it
          if ! git diff --staged --name-only | grep -q "fascinating_frontiers_podcast.rss"; then
            git add fascinating_frontiers_podcast.rss
            echo "📡 Staged RSS feed changes"
          fi
          
          echo "💾 Committing files..."
          git commit -m "Auto-generated: Fascinating Frontiers Bi-Daily $(date +%Y-%m-%d)" || echo "Commit failed (may be empty)"
          
          echo "🚀 Pushing to repository..."
          git push || echo "Push failed"
          
          echo "✅ Files committed and pushed successfully to repository!"
          echo ""
          echo "📊 Summary of what was generated:"
          echo "  ✓ Daily digest (X thread)"
          echo "  ✓ Posted to X (@planetterrian)"
          echo "  ✓ Podcast script generated"
          echo "  ✓ Podcast audio created (Eleven Labs TTS)"
          echo "  ✓ RSS feed updated"
          echo "  ✓ Credit usage file generated"
        else
          echo "⚠️  No new files to commit - script may have failed or no new content generated"
        fi
      continue-on-error: true  # Don't fail workflow if commit/push fails

