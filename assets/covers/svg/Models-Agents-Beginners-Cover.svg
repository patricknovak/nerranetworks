<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bulb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFDE7"/>
      <stop offset="100%" stop-color="#FFF9C4"/>
    </linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="24" stdDeviation="50" flood-color="#78350F" flood-opacity="0.5"/></filter>
    <filter id="ts"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#78350F" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="3000" height="3000" rx="500" fill="url(#bg)"/>
  <rect width="3000" height="3000" rx="500" fill="url(#shine)"/>

  <!-- Lightbulb with AI nodes -->
  <g transform="translate(1500, 1050)" filter="url(#ds)">
    <path d="M-250,-150 Q-320,-380 0,-480 Q320,-380 250,-150" fill="url(#bulb)" stroke="white" stroke-width="18" stroke-linejoin="round"/>
    <path d="M-250,-150 Q-250,60 -160,130 L160,130 Q250,60 250,-150" fill="url(#bulb)" stroke="white" stroke-width="18" stroke-linejoin="round"/>
    <!-- Base -->
    <rect x="-140" y="160" width="280" height="36" rx="18" fill="white" opacity="0.9"/>
    <rect x="-120" y="214" width="240" height="32" rx="16" fill="white" opacity="0.8"/>
    <rect x="-95" y="264" width="190" height="28" rx="14" fill="white" opacity="0.7"/>
    <path d="M-50,304 Q0,340 50,304" fill="none" stroke="white" stroke-width="12" opacity="0.6" stroke-linecap="round"/>
    <!-- AI nodes inside -->
    <circle cx="0" cy="-260" r="40" fill="#F59E0B" stroke="white" stroke-width="8"/>
    <circle cx="-140" cy="-120" r="32" fill="#F59E0B" stroke="white" stroke-width="7"/>
    <circle cx="140" cy="-120" r="32" fill="#F59E0B" stroke="white" stroke-width="7"/>
    <circle cx="-85" cy="20" r="28" fill="#F59E0B" stroke="white" stroke-width="6"/>
    <circle cx="85" cy="20" r="28" fill="#F59E0B" stroke="white" stroke-width="6"/>
    <!-- Connections -->
    <line x1="0" y1="-260" x2="-140" y2="-120" stroke="white" stroke-width="9" opacity="0.55"/>
    <line x1="0" y1="-260" x2="140" y2="-120" stroke="white" stroke-width="9" opacity="0.55"/>
    <line x1="-140" y1="-120" x2="-85" y2="20" stroke="white" stroke-width="7" opacity="0.45"/>
    <line x1="140" y1="-120" x2="85" y2="20" stroke="white" stroke-width="7" opacity="0.45"/>
    <line x1="-140" y1="-120" x2="85" y2="20" stroke="white" stroke-width="5" opacity="0.25"/>
    <line x1="140" y1="-120" x2="-85" y2="20" stroke="white" stroke-width="5" opacity="0.25"/>
    <!-- Rays -->
    <line x1="0" y1="-560" x2="0" y2="-520" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.6"/>
    <line x1="-230" y1="-480" x2="-200" y2="-450" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
    <line x1="230" y1="-480" x2="200" y2="-450" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
    <line x1="-360" y1="-260" x2="-320" y2="-250" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
    <line x1="360" y1="-260" x2="320" y2="-250" stroke="white" stroke-width="12" stroke-linecap="round" opacity="0.4"/>
  </g>

  <g filter="url(#ts)">
    <text x="1500" y="2020" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="200" fill="white">Models &amp;</text>
    <text x="1500" y="2240" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="200" fill="white">Agents</text>
    <text x="1500" y="2460" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="160" fill="white" opacity="0.9">for Beginners</text>
  </g>
  <text x="1500" y="2640" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" font-size="72" fill="white" opacity="0.6" letter-spacing="6">AI MADE SIMPLE</text>
</svg>