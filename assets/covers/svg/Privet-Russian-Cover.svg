<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#3730A3"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="24" stdDeviation="50" flood-color="#1E1B4B" flood-opacity="0.5"/></filter>
    <filter id="ts"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1E1B4B" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="3000" height="3000" rx="500" fill="url(#bg)"/>
  <rect width="3000" height="3000" rx="500" fill="url(#shine)"/>

  <!-- Speech bubble with Cyrillic -->
  <g transform="translate(1500, 1000)" filter="url(#ds)">
    <!-- Main speech bubble -->
    <path d="M-340,-320 Q-340,-420 -240,-420 L240,-420 Q340,-420 340,-320 L340,100 Q340,200 240,200 L60,200 L-40,340 L-20,200 L-240,200 Q-340,200 -340,100 Z"
          fill="white" opacity="0.92" stroke="white" stroke-width="8"/>

    <!-- Cyrillic Я (Ya) - iconic Russian letter -->
    <text x="0" y="20" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="900" font-size="480" fill="#3730A3" opacity="0.85">Я</text>

    <!-- Small decorative dots - like language particles -->
    <circle cx="-420" cy="-200" r="40" fill="white" opacity="0.5"/>
    <circle cx="-480" cy="-80" r="24" fill="white" opacity="0.35"/>
    <circle cx="-510" cy="40" r="14" fill="white" opacity="0.25"/>

    <!-- Second smaller bubble - response -->
    <circle cx="400" cy="-280" r="70" fill="white" opacity="0.4"/>
    <text x="400" y="-258" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="80" fill="#3730A3" opacity="0.5">!</text>

    <!-- Accent marks / language flourishes -->
    <line x1="-200" y1="-460" x2="-170" y2="-500" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.45"/>
    <line x1="0" y1="-470" x2="0" y2="-520" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.5"/>
    <line x1="200" y1="-460" x2="170" y2="-500" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.45"/>

    <!-- Russian flag stripe accents on bubble -->
    <rect x="-280" y="130" width="560" height="18" rx="9" fill="#DC2626" opacity="0.3"/>
    <rect x="-280" y="158" width="560" height="18" rx="9" fill="#2563EB" opacity="0.3"/>
  </g>

  <!-- Title -->
  <g filter="url(#ts)">
    <text x="1500" y="2020" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="240" fill="white">Привет,</text>
    <text x="1500" y="2300" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="260" fill="white">Русский!</text>
  </g>
  <text x="1500" y="2520" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" font-size="80" fill="white" opacity="0.6" letter-spacing="6">LEARN RUSSIAN</text>
</svg>