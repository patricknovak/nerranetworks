<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="50%" stop-color="#E31937"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="24" stdDeviation="50" flood-color="#7F1D1D" flood-opacity="0.5"/></filter>
    <filter id="ts"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#7F1D1D" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="3000" height="3000" rx="500" fill="url(#bg)"/>
  <rect width="3000" height="3000" rx="500" fill="url(#shine)"/>

  <!-- Lightning bolt -->
  <g transform="translate(1500, 1050)" filter="url(#ds)">
    <path d="M60,-480 L-180,40 L20,40 L-100,480 L260,-60 L60,-60 Z"
          fill="#FBBF24" stroke="#FDE68A" stroke-width="20" stroke-linejoin="round"/>
    <!-- Highlight streak -->
    <path d="M30,-380 L-80,0 L10,0 L-30,280" fill="none" stroke="white" stroke-width="16" opacity="0.35" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <g filter="url(#ts)">
    <text x="1500" y="2000" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="240" fill="white">Tesla Shorts</text>
    <text x="1500" y="2280" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="240" fill="white">Time</text>
  </g>
  <text x="1500" y="2500" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" font-size="80" fill="white" opacity="0.6" letter-spacing="8">DAILY PODCAST</text>
</svg>