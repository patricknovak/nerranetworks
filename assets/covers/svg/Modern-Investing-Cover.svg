<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="40%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chartGreen" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="24" stdDeviation="50" flood-color="#022c22" flood-opacity="0.5"/></filter>
    <filter id="ts"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#022c22" flood-opacity="0.35"/></filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="3000" height="3000" rx="500" fill="url(#bg)"/>
  <rect width="3000" height="3000" rx="500" fill="url(#shine)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.08" stroke="white" stroke-width="2">
    <line x1="300" y1="400" x2="300" y2="1600"/>
    <line x1="750" y1="400" x2="750" y2="1600"/>
    <line x1="1200" y1="400" x2="1200" y2="1600"/>
    <line x1="1650" y1="400" x2="1650" y2="1600"/>
    <line x1="2100" y1="400" x2="2100" y2="1600"/>
    <line x1="2550" y1="400" x2="2550" y2="1600"/>
    <line x1="200" y1="600" x2="2800" y2="600"/>
    <line x1="200" y1="900" x2="2800" y2="900"/>
    <line x1="200" y1="1200" x2="2800" y2="1200"/>
  </g>

  <!-- Chart area fill -->
  <path d="M300,1400 L600,1300 L900,1350 L1200,1100 L1500,1150 L1800,900 L2100,950 L2400,700 L2700,500 L2700,1600 L300,1600 Z" fill="url(#chartGreen)"/>

  <!-- Candlestick chart -->
  <g filter="url(#ds)">
    <!-- Candle 1 - red -->
    <line x1="450" y1="1150" x2="450" y2="1450" stroke="#F87171" stroke-width="8" opacity="0.8"/>
    <rect x="420" y="1250" width="60" height="120" rx="6" fill="#F87171" opacity="0.9"/>

    <!-- Candle 2 - green -->
    <line x1="750" y1="1050" x2="750" y2="1400" stroke="#34D399" stroke-width="8" opacity="0.8"/>
    <rect x="720" y="1100" width="60" height="180" rx="6" fill="#34D399" opacity="0.9"/>

    <!-- Candle 3 - red -->
    <line x1="1050" y1="1000" x2="1050" y2="1350" stroke="#F87171" stroke-width="8" opacity="0.8"/>
    <rect x="1020" y="1100" width="60" height="150" rx="6" fill="#F87171" opacity="0.9"/>

    <!-- Candle 4 - green -->
    <line x1="1350" y1="850" x2="1350" y2="1250" stroke="#34D399" stroke-width="8" opacity="0.8"/>
    <rect x="1320" y="900" width="60" height="200" rx="6" fill="#34D399" opacity="0.9"/>

    <!-- Candle 5 - green -->
    <line x1="1650" y1="750" x2="1650" y2="1100" stroke="#34D399" stroke-width="8" opacity="0.8"/>
    <rect x="1620" y="800" width="60" height="170" rx="6" fill="#34D399" opacity="0.9"/>

    <!-- Candle 6 - red -->
    <line x1="1950" y1="650" x2="1950" y2="1000" stroke="#F87171" stroke-width="8" opacity="0.8"/>
    <rect x="1920" y="750" width="60" height="130" rx="6" fill="#F87171" opacity="0.9"/>

    <!-- Candle 7 - green (big) -->
    <line x1="2250" y1="500" x2="2250" y2="900" stroke="#34D399" stroke-width="8" opacity="0.8"/>
    <rect x="2220" y="550" width="60" height="250" rx="6" fill="#34D399" opacity="0.9"/>

    <!-- Candle 8 - green -->
    <line x1="2550" y1="400" x2="2550" y2="750" stroke="#34D399" stroke-width="8" opacity="0.8"/>
    <rect x="2520" y="450" width="60" height="180" rx="6" fill="#34D399" opacity="0.9"/>
  </g>

  <!-- Trend line -->
  <path d="M300,1400 C600,1300 900,1350 1200,1100 S1800,900 2100,700 S2550,450 2700,400"
        fill="none" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>

  <!-- AI brain icon (small, top-right) -->
  <g transform="translate(2500, 350)" opacity="0.25">
    <circle cx="0" cy="0" r="80" fill="none" stroke="white" stroke-width="6"/>
    <path d="M-40,-20 Q-20,-50 0,-20 Q20,-50 40,-20" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <path d="M-30,10 Q0,40 30,10" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <circle cx="-25" cy="-15" r="6" fill="white"/>
    <circle cx="25" cy="-15" r="6" fill="white"/>
  </g>

  <!-- Title -->
  <g filter="url(#ts)">
    <text x="1500" y="2050" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="260" fill="white">Modern</text>
    <text x="1500" y="2340" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="260" fill="white">Investing</text>
  </g>

  <!-- Tagline -->
  <text x="1500" y="2560" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" font-size="90" fill="white" opacity="0.6" letter-spacing="8">AI-POWERED MARKET INTELLIGENCE</text>

  <!-- Nerra Network branding -->
  <text x="1500" y="2750" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="400" font-size="60" fill="white" opacity="0.35" letter-spacing="12">NERRA NETWORK</text>
</svg>
