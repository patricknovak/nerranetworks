<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#018DB1"/>
      <stop offset="100%" stop-color="#0E4D64"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="ds"><feDropShadow dx="0" dy="24" stdDeviation="50" flood-color="#0E4D64" flood-opacity="0.5"/></filter>
    <filter id="ts"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0E4D64" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="3000" height="3000" rx="500" fill="url(#bg)"/>
  <rect width="3000" height="3000" rx="500" fill="url(#shine)"/>

  <!-- DNA Double Helix -->
  <g transform="translate(1500, 1050)" filter="url(#ds)">
    <!-- Left strand — magenta/pink -->
    <path d="M-140,-450 Q200,-300 -140,-150 Q200,0 -140,150 Q200,300 -140,450"
          fill="none" stroke="#F472B6" stroke-width="32" stroke-linecap="round" opacity="0.9"/>
    <!-- Right strand — magenta/pink lighter -->
    <path d="M140,-450 Q-200,-300 140,-150 Q-200,0 140,150 Q-200,300 140,450"
          fill="none" stroke="#C084FC" stroke-width="32" stroke-linecap="round" opacity="0.9"/>
    <!-- Rungs (base pairs) -->
    <g stroke="white" stroke-width="14" opacity="0.5" stroke-linecap="round">
      <line x1="-80" y1="-380" x2="80" y2="-380"/>
      <line x1="-120" y1="-300" x2="120" y2="-300"/>
      <line x1="-90" y1="-220" x2="90" y2="-220"/>
      <line x1="-50" y1="-150" x2="50" y2="-150"/>
      <line x1="-120" y1="-70" x2="120" y2="-70"/>
      <line x1="-90" y1="10" x2="90" y2="10"/>
      <line x1="-50" y1="80" x2="50" y2="80"/>
      <line x1="-120" y1="160" x2="120" y2="160"/>
      <line x1="-90" y1="240" x2="90" y2="240"/>
      <line x1="-50" y1="310" x2="50" y2="310"/>
      <line x1="-120" y1="380" x2="120" y2="380"/>
    </g>
    <!-- Glow dots at intersections -->
    <circle cx="0" cy="-300" r="14" fill="white" opacity="0.5"/>
    <circle cx="0" cy="-70" r="14" fill="white" opacity="0.5"/>
    <circle cx="0" cy="160" r="14" fill="white" opacity="0.5"/>
  </g>

  <g filter="url(#ts)">
    <text x="1500" y="2020" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="210" fill="white">Planetterrian</text>
    <text x="1500" y="2280" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="260" fill="white">Daily</text>
  </g>
  <text x="1500" y="2500" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" font-size="80" fill="white" opacity="0.6" letter-spacing="6">LONGEVITY &amp; BIOTECH</text>
</svg>