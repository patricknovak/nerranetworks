<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rocketBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="24" stdDeviation="50" flood-color="#2E1065" flood-opacity="0.5"/></filter>
    <filter id="ts"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#2E1065" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="3000" height="3000" rx="500" fill="url(#bg)"/>
  <rect width="3000" height="3000" rx="500" fill="url(#shine)"/>

  <!-- Stars background -->
  <g fill="white">
    <circle cx="400" cy="300" r="6" opacity="0.5"/>
    <circle cx="2600" cy="200" r="5" opacity="0.4"/>
    <circle cx="300" cy="800" r="4" opacity="0.35"/>
    <circle cx="2700" cy="700" r="7" opacity="0.45"/>
    <circle cx="500" cy="1200" r="3" opacity="0.3"/>
    <circle cx="2500" cy="1100" r="5" opacity="0.4"/>
    <circle cx="800" cy="400" r="4" opacity="0.35"/>
    <circle cx="2200" cy="350" r="3" opacity="0.3"/>
    <circle cx="350" cy="1600" r="5" opacity="0.35"/>
    <circle cx="2650" cy="1500" r="4" opacity="0.3"/>
  </g>

  <!-- Rocket -->
  <g transform="translate(1500, 1050) rotate(-25)" filter="url(#ds)">
    <!-- Body -->
    <path d="M0,-420 Q80,-360 90,-100 L90,200 L-90,200 L-90,-100 Q-80,-360 0,-420 Z" fill="url(#rocketBody)" stroke="white" stroke-width="10"/>
    <!-- Nose cone highlight -->
    <path d="M-30,-380 Q0,-420 30,-380 Q10,-300 -30,-380" fill="white" opacity="0.4"/>
    <!-- Window -->
    <circle cx="0" cy="-120" r="60" fill="#7C5CFF" stroke="white" stroke-width="12"/>
    <circle cx="-15" cy="-135" r="18" fill="white" opacity="0.3"/>
    <!-- Body stripe -->
    <rect x="-90" y="80" width="180" height="50" fill="#EF4444" rx="4"/>
    <!-- Fins -->
    <path d="M-90,100 L-180,260 L-90,220 Z" fill="#EF4444" stroke="white" stroke-width="8"/>
    <path d="M90,100 L180,260 L90,220 Z" fill="#EF4444" stroke="white" stroke-width="8"/>
    <!-- Flame -->
    <path d="M-60,200 Q-40,340 0,400 Q40,340 60,200" fill="#FBBF24" opacity="0.9"/>
    <path d="M-35,200 Q-20,300 0,350 Q20,300 35,200" fill="#FDE68A" opacity="0.8"/>
    <!-- Exhaust trail -->
    <path d="M-40,400 Q0,520 40,400" fill="none" stroke="#FBBF24" stroke-width="12" opacity="0.4"/>
  </g>

  <g filter="url(#ts)">
    <text x="1500" y="2020" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="210" fill="white">Fascinating</text>
    <text x="1500" y="2280" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="240" fill="white">Frontiers</text>
  </g>
  <text x="1500" y="2500" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" font-size="80" fill="white" opacity="0.6" letter-spacing="6">SPACE &amp; ASTRONOMY</text>
</svg>