<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:0" />
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bgGrad)" rx="20"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="white" stroke-width="1"/>
  </g>

  <!-- Network constellation mark -->
  <g transform="translate(175, 200)" filter="url(#softGlow)">
    <circle cx="0" cy="0" r="120" fill="url(#glow)"/>
    <!-- Connection lines from hub -->
    <line x1="0" y1="0" x2="-65" y2="-55" stroke="url(#lineGrad)" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="70" y2="-50" stroke="url(#lineGrad)" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="-75" y2="40" stroke="url(#lineGrad)" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="65" y2="55" stroke="url(#lineGrad)" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="-10" y2="75" stroke="url(#lineGrad)" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="30" y2="-80" stroke="url(#lineGrad)" stroke-width="2.5"/>
    <line x1="0" y1="0" x2="-50" y2="-10" stroke="url(#lineGrad)" stroke-width="2"/>
    <!-- Cross connections -->
    <line x1="-65" y1="-55" x2="70" y2="-50" stroke="white" stroke-width="1" opacity="0.15"/>
    <line x1="-75" y1="40" x2="65" y2="55" stroke="white" stroke-width="1" opacity="0.15"/>
    <line x1="70" y1="-50" x2="65" y2="55" stroke="white" stroke-width="1" opacity="0.15"/>
    <line x1="-65" y1="-55" x2="-75" y2="40" stroke="white" stroke-width="1" opacity="0.15"/>
    <!-- Show color nodes -->
    <circle cx="-65" cy="-55" r="10" fill="#E31937" opacity="0.9"/>
    <circle cx="70" cy="-50" r="10" fill="#0B6FD6" opacity="0.9"/>
    <circle cx="30" cy="-80" r="10" fill="#7C5CFF" opacity="0.9"/>
    <circle cx="-75" cy="40" r="10" fill="#018DB1" opacity="0.9"/>
    <circle cx="-10" cy="75" r="10" fill="#1B5E20" opacity="0.9"/>
    <circle cx="65" cy="55" r="10" fill="#8B5CF6" opacity="0.9"/>
    <circle cx="-50" cy="-10" r="10" fill="#F59E0B" opacity="0.9"/>
    <!-- Central hub -->
    <circle cx="0" cy="0" r="18" fill="url(#nodeGrad)"/>
    <circle cx="0" cy="0" r="8" fill="white" opacity="0.9"/>
  </g>

  <!-- Wordmark -->
  <text x="330" y="185" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="90" fill="white" letter-spacing="8">NERRA</text>
  <text x="330" y="270" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="200" font-size="90" fill="white" letter-spacing="12" opacity="0.85">NETWORK</text>

  <!-- Tagline — no show count -->
  <text x="335" y="315" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="22" fill="#60A5FA" letter-spacing="6" opacity="0.8">INDEPENDENT PODCAST NETWORK</text>

  <line x1="335" y1="335" x2="750" y2="335" stroke="url(#lineGrad)" stroke-width="2" opacity="0.4"/>
</svg>