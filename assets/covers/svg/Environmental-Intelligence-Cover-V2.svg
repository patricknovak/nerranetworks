<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="50%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>
    <radialGradient id="shine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="white" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BBF7D0"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
    <filter id="ds"><feDropShadow dx="0" dy="24" stdDeviation="50" flood-color="#052E16" flood-opacity="0.5"/></filter>
    <filter id="ts"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#052E16" flood-opacity="0.35"/></filter>
  </defs>
  <rect width="3000" height="3000" rx="500" fill="url(#bg)"/>
  <rect width="3000" height="3000" rx="500" fill="url(#shine)"/>

  <!-- Leaf/sprout -->
  <g transform="translate(1500, 1100)" filter="url(#ds)">
    <!-- Stem -->
    <path d="M0,350 Q0,100 0,-50" fill="none" stroke="#BBF7D0" stroke-width="28" stroke-linecap="round"/>
    <!-- Main leaf -->
    <path d="M0,-50 Q-280,-200 -180,-420 Q0,-350 180,-420 Q280,-200 0,-50 Z" fill="url(#leafGrad)" stroke="white" stroke-width="14" opacity="0.9"/>
    <!-- Leaf vein center -->
    <path d="M0,-50 L0,-340" fill="none" stroke="white" stroke-width="10" opacity="0.45" stroke-linecap="round"/>
    <!-- Leaf veins -->
    <path d="M0,-120 L-100,-200" fill="none" stroke="white" stroke-width="7" opacity="0.3" stroke-linecap="round"/>
    <path d="M0,-120 L100,-200" fill="none" stroke="white" stroke-width="7" opacity="0.3" stroke-linecap="round"/>
    <path d="M0,-200 L-120,-280" fill="none" stroke="white" stroke-width="7" opacity="0.3" stroke-linecap="round"/>
    <path d="M0,-200 L120,-280" fill="none" stroke="white" stroke-width="7" opacity="0.3" stroke-linecap="round"/>
    <!-- Small side leaves -->
    <path d="M0,180 Q-180,80 -160,20 Q-80,80 0,180 Z" fill="url(#leafGrad)" stroke="white" stroke-width="10" opacity="0.65"/>
    <path d="M0,260 Q180,160 160,100 Q80,160 0,260 Z" fill="url(#leafGrad)" stroke="white" stroke-width="10" opacity="0.55"/>
    <!-- Water droplet -->
    <path d="M-220,-280 Q-220,-310 -200,-320 Q-180,-310 -180,-280 Q-200,-260 -220,-280 Z" fill="white" opacity="0.5"/>
  </g>

  <g filter="url(#ts)">
    <text x="1500" y="2020" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="180" fill="white">Environmental</text>
    <text x="1500" y="2280" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="800" font-size="200" fill="white">Intelligence</text>
  </g>
  <text x="1500" y="2500" text-anchor="middle" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-weight="500" font-size="80" fill="white" opacity="0.6" letter-spacing="6">REGULATION &amp; POLICY</text>
</svg>