<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 3000" width="3000" height="3000">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1B5E20;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D3B11;stop-opacity:1" />
    </linearGradient>
    <!-- Accent gradient for decorative elements -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:0.2" />
    </linearGradient>
    <!-- Glow for icon -->
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:0" />
    </radialGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <!-- Topographic line pattern -->
    <pattern id="topo" width="200" height="200" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
      <circle cx="100" cy="100" r="40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
      <circle cx="100" cy="100" r="70" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
      <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="3000" height="3000" fill="url(#bgGrad)"/>

  <!-- Grid overlay -->
  <rect width="3000" height="3000" fill="url(#grid)"/>

  <!-- Topographic pattern overlay -->
  <rect width="3000" height="3000" fill="url(#topo)"/>

  <!-- Decorative accent lines (top) -->
  <line x1="0" y1="80" x2="3000" y2="80" stroke="#1565C0" stroke-width="3" opacity="0.4"/>
  <line x1="0" y1="90" x2="2200" y2="90" stroke="#1565C0" stroke-width="2" opacity="0.25"/>

  <!-- Decorative accent lines (bottom) -->
  <line x1="800" y1="2910" x2="3000" y2="2910" stroke="#1565C0" stroke-width="3" opacity="0.4"/>
  <line x1="800" y1="2920" x2="3000" y2="2920" stroke="#1565C0" stroke-width="2" opacity="0.25"/>

  <!-- Abstract data/waveform decoration (left side) -->
  <g opacity="0.12">
    <rect x="100" y="1200" width="4" height="180" rx="2" fill="white"/>
    <rect x="120" y="1250" width="4" height="120" rx="2" fill="white"/>
    <rect x="140" y="1220" width="4" height="160" rx="2" fill="white"/>
    <rect x="160" y="1270" width="4" height="80" rx="2" fill="white"/>
    <rect x="180" y="1230" width="4" height="140" rx="2" fill="white"/>
    <rect x="200" y="1260" width="4" height="100" rx="2" fill="white"/>
    <rect x="220" y="1210" width="4" height="180" rx="2" fill="white"/>
    <rect x="240" y="1250" width="4" height="110" rx="2" fill="white"/>
    <rect x="260" y="1235" width="4" height="130" rx="2" fill="white"/>
    <rect x="280" y="1275" width="4" height="60" rx="2" fill="white"/>
  </g>

  <!-- Abstract data decoration (right side) -->
  <g opacity="0.12">
    <rect x="2700" y="1600" width="4" height="140" rx="2" fill="white"/>
    <rect x="2720" y="1630" width="4" height="100" rx="2" fill="white"/>
    <rect x="2740" y="1610" width="4" height="150" rx="2" fill="white"/>
    <rect x="2760" y="1650" width="4" height="70" rx="2" fill="white"/>
    <rect x="2780" y="1590" width="4" height="180" rx="2" fill="white"/>
    <rect x="2800" y="1640" width="4" height="90" rx="2" fill="white"/>
    <rect x="2820" y="1615" width="4" height="130" rx="2" fill="white"/>
    <rect x="2840" y="1660" width="4" height="60" rx="2" fill="white"/>
    <rect x="2860" y="1620" width="4" height="120" rx="2" fill="white"/>
    <rect x="2880" y="1645" width="4" height="80" rx="2" fill="white"/>
  </g>

  <!-- Central icon area glow -->
  <circle cx="1500" cy="1050" r="350" fill="url(#iconGlow)"/>

  <!-- Molecule / network icon — representing environmental science -->
  <g transform="translate(1500, 1050)" stroke="white" fill="none" stroke-width="5">
    <!-- Central node -->
    <circle cx="0" cy="0" r="45" fill="#1565C0" stroke="white" stroke-width="6"/>
    <!-- Inner ring nodes -->
    <circle cx="-140" cy="-90" r="28" fill="#1B5E20" stroke="white" stroke-width="4"/>
    <circle cx="140" cy="-90" r="28" fill="#1B5E20" stroke="white" stroke-width="4"/>
    <circle cx="0" cy="160" r="28" fill="#1B5E20" stroke="white" stroke-width="4"/>
    <circle cx="-170" cy="70" r="28" fill="#1B5E20" stroke="white" stroke-width="4"/>
    <circle cx="170" cy="70" r="28" fill="#1B5E20" stroke="white" stroke-width="4"/>
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-140" y2="-90" stroke="white" stroke-width="3" opacity="0.7"/>
    <line x1="0" y1="0" x2="140" y2="-90" stroke="white" stroke-width="3" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="160" stroke="white" stroke-width="3" opacity="0.7"/>
    <line x1="0" y1="0" x2="-170" y2="70" stroke="white" stroke-width="3" opacity="0.7"/>
    <line x1="0" y1="0" x2="170" y2="70" stroke="white" stroke-width="3" opacity="0.7"/>
    <!-- Outer nodes -->
    <circle cx="-240" cy="-180" r="18" fill="none" stroke="#1565C0" stroke-width="3"/>
    <circle cx="240" cy="-180" r="18" fill="none" stroke="#1565C0" stroke-width="3"/>
    <circle cx="-280" cy="120" r="18" fill="none" stroke="#1565C0" stroke-width="3"/>
    <circle cx="280" cy="120" r="18" fill="none" stroke="#1565C0" stroke-width="3"/>
    <circle cx="0" cy="270" r="18" fill="none" stroke="#1565C0" stroke-width="3"/>
    <circle cx="-100" cy="240" r="18" fill="none" stroke="#1565C0" stroke-width="3"/>
    <circle cx="100" cy="240" r="18" fill="none" stroke="#1565C0" stroke-width="3"/>
    <!-- Outer connections -->
    <line x1="-140" y1="-90" x2="-240" y2="-180" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
    <line x1="140" y1="-90" x2="240" y2="-180" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
    <line x1="-170" y1="70" x2="-280" y2="120" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
    <line x1="170" y1="70" x2="280" y2="120" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="160" x2="0" y2="270" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="160" x2="-100" y2="240" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="160" x2="100" y2="240" stroke="#1565C0" stroke-width="2" opacity="0.5"/>
    <!-- Cross connections for network feel -->
    <line x1="-140" y1="-90" x2="140" y2="-90" stroke="white" stroke-width="2" opacity="0.25"/>
    <line x1="-170" y1="70" x2="0" y2="160" stroke="white" stroke-width="2" opacity="0.25"/>
    <line x1="170" y1="70" x2="0" y2="160" stroke="white" stroke-width="2" opacity="0.25"/>
  </g>

  <!-- Small leaf accent inside central node -->
  <g transform="translate(1500, 1050)">
    <path d="M-12,-8 Q0,-25 12,-8 Q0,5 -12,-8 Z" fill="white" opacity="0.9"/>
    <line x1="0" y1="-8" x2="0" y2="10" stroke="white" stroke-width="2.5" opacity="0.9"/>
  </g>

  <!-- Title: ENVIRONMENTAL -->
  <text x="1500" y="1580" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="195" fill="white" letter-spacing="18">ENVIRONMENTAL</text>

  <!-- Title: INTELLIGENCE -->
  <text x="1500" y="1790" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="195" fill="white" letter-spacing="22">INTELLIGENCE</text>

  <!-- Divider line -->
  <line x1="900" y1="1870" x2="2100" y2="1870" stroke="#1565C0" stroke-width="4" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="1500" y="1970" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="72" fill="white" opacity="0.85" letter-spacing="12">BC ENVIRONMENTAL REGULATION</text>

  <!-- Secondary line -->
  <text x="1500" y="2070" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="300" font-size="56" fill="white" opacity="0.6" letter-spacing="8">CONTAMINATED SITES • CLIMATE POLICY • SCIENCE</text>

  <!-- Podcast badge -->
  <g transform="translate(1500, 2350)">
    <rect x="-180" y="-38" width="360" height="76" rx="38" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>
    <!-- Microphone icon -->
    <g transform="translate(-130, 0)">
      <rect x="-8" y="-18" width="16" height="28" rx="8" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
      <path d="M-14,8 Q-14,22 0,22 Q14,22 14,8" fill="none" stroke="white" stroke-width="2.5" opacity="0.7"/>
      <line x1="0" y1="22" x2="0" y2="30" stroke="white" stroke-width="2.5" opacity="0.7"/>
    </g>
    <text x="10" y="10" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="38" fill="white" opacity="0.7" letter-spacing="6">PODCAST</text>
  </g>
</svg>