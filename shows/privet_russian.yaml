name: "Привет, Русский!"
slug: privet_russian
description: "Bilingual Russian language learning podcast for English speakers — kids and adult beginners. Host Olya teaches vocabulary, phrases, and culture through fun, themed episodes. Привет means hello. Русский means Russian. Let's learn together!"

sources:
  # General news for vocabulary theme inspiration
  - url: https://feeds.bbci.co.uk/news/rss.xml
    label: BBC News
  - url: https://feeds.npr.org/1001/rss.xml
    label: NPR
  - url: https://www.theverge.com/rss/index.xml
    label: The Verge

  # Science & Nature (great for vocabulary themes)
  - url: https://www.sciencedaily.com/rss/top/science.xml
    label: ScienceDaily
  - url: https://phys.org/rss-feed/
    label: Phys.org

  # Russian culture & language resources
  - url: https://www.themoscowtimes.com/rss/news
    label: Moscow Times
  - url: https://meduza.io/rss/en/all
    label: Meduza English

  # Language learning & education
  # russianwithmax.com/feed/ removed 2026-04-16 — returns 403 Forbidden
  # Removed: transparent.com/russian (dead since 2022), russianpod101 (503),
  # fluentu.com/russian (stale since 2024)

  # Kids & family vocabulary inspiration
  - url: https://www.sciencenewsforstudents.org/feed
    label: Science News for Students
  - url: https://www.atlasobscura.com/feeds/latest
    label: Atlas Obscura
  - url: https://www.smithsonianmag.com/rss/latest_articles/
    label: Smithsonian Magazine
  # Removed: wonderopolis.org (503 error)

  # Canadian multiculturalism & diaspora life
  - url: https://www.cbc.ca/webfeed/rss/rss-canada
    label: CBC Canada
  - url: https://www.ukrinform.net/rss/block-lastnews
    label: Ukrinform (Ukrainian perspectives)

  # High-volume general news (vocabulary themes can come from any topic)
  - url: https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml
    label: New York Times
  - url: https://www.theguardian.com/world/rss
    label: The Guardian World
  - url: https://feeds.washingtonpost.com/rss/world
    label: Washington Post World
  # Google News — vocabulary theme inspiration
  - url: "https://news.google.com/rss/search?q=science+discovery+nature+animals&hl=en-US&gl=US&ceid=US:en"
    label: Google News Science Nature
  - url: "https://news.google.com/rss/search?q=Russian+culture+language+news&hl=en-US&gl=US&ceid=US:en"
    label: Google News Russian Culture

web_search_queries:
  - "interesting science news for kids"
  - "Russian culture traditions news"
  - "fun world news vocabulary themes"

x_accounts:
  - handle: meduzaproject
    label: Meduza (Russian news in English)
    max_posts: 3
  - handle: MoscowTimes
    label: The Moscow Times
    max_posts: 3
  - handle: russianpod101
    label: RussianPod101 (language learning)
    max_posts: 3
  - handle: rferl
    label: Radio Free Europe / Radio Liberty
    max_posts: 3

min_articles_skip: 1

keywords:
  # Topics that generate good vocabulary themes
  - animals
  - food
  - weather
  - space
  - nature
  - family
  - school
  - sports
  - music
  - travel
  - technology
  - holiday
  - festival
  - tradition
  - cooking
  - ocean
  - mountains
  - winter
  - summer
  - garden
  - city
  - market
  - museum
  - library
  - park

llm:
  provider: xai
  system_prompt_file: shows/prompts/privet_russian_system.txt
  digest_prompt_file: shows/prompts/privet_russian_digest.txt
  podcast_prompt_file: shows/prompts/privet_russian_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.75
  max_tokens: 4000
  podcast_max_tokens: 5000
  min_podcast_words: 800

tts:
  voice_id: gedzfqL7OGdPbwm0ynTP
  language_code: ru
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  music_file: assets/music/tesla_shorts_time.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

publishing:
  host_name: "Оля"
  # rss_language defaults to en-us — primary audience is English speakers learning Russian
  rss_file: privet_russian_podcast.rss
  rss_title: "Привет, Русский!"
  rss_description: "Learn Russian with Olya! A bilingual podcast for English speakers — kids and adult beginners. Each episode teaches vocabulary, phrases, and culture through fun, themed lessons. Привет means hello. Let's learn together!"
  rss_link: https://nerranetwork.com/ru/privet-russian.html
  rss_author: Nerra Network
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/privet-russian.jpg
  rss_category: Education
  guid_prefix: pr
  base_url: https://nerranetwork.com
  audio_subdir: digests/privet_russian
  summaries_json: digests/privet_russian/summaries_privet_russian.json
  summaries_podcast_name: privet_russian
  player_html: ru/privet-russian.html
  summaries_html: ru/privet-russian-summaries.html
  x_enabled: false
  x_env_prefix: ""

episode:
  prefix: PR
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/privet_russian
  mp3_glob: "PR_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Privyet|welcome to Privyet"
      title: "Привет! Welcome"
    - pattern: "word of the day|first word"
      title: "Word of the Day"
    - pattern: "vocabulary builder|let's learn more|more words"
      title: "Vocabulary Builder"
    - pattern: "grammar bite|grammar time|how Russian works"
      title: "Grammar Bite"
    - pattern: "word origins|where.*come from|etymology|history of"
      title: "Word Origins Deep Dive"
    - pattern: "culture corner|fun fact|did you know"
      title: "Culture Corner"
    - pattern: "practice time|quiz|remember what"
      title: "Practice Time"
    - pattern: "molodets|well done|poka|see you"
      title: "Closing"

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: BUTTONDOWN_API_KEY
  status: about_to_send
  # Buttondown rejects tags with no ASCII letter/number, so we use the
  # transliterated form rather than the Cyrillic show display name.
  tag: "Privet Russian"
  short_label: "Привет"
  emoji: "🇷🇺"
  newsletter_start_date: "2026-04-30"
  requires_financial_disclaimer: false
  length_target_words: 1300

slow_news:
  enabled: true
  library_file: shows/segments/privet_russian.json
  max_segments: 2
  cooldown_days: 30

youtube:
  podcast_playlist_id: PLrkQSSjMOK2d9QSWFlehgK5dlv38lfqWI
  enabled: false                # Phase 2 — flip after quota raise + RU channel set up
  channel: ru
  category_id: 27               # Education (language learning)
  default_language: ru
  tags:
    - learn russian
    - russian for beginners
    - russian language
    - russian podcast
    - bilingual russian
