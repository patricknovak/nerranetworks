name: "Привет, Русский!"
slug: privet_russian
description: "Bilingual Russian language learning podcast for English speakers — kids and adult beginners. Host Olya teaches vocabulary, phrases, and culture through fun, themed episodes. Привет means hello. Русский means Russian. Let's learn together!"

sources:
  # General news for vocabulary theme inspiration
  - url: https://feeds.bbci.co.uk/news/rss.xml
    label: BBC News
  - url: https://feeds.npr.org/1001/rss.xml
    label: NPR
  - url: https://www.theverge.com/rss/index.xml
    label: The Verge

  # Science & Nature (great for vocabulary themes)
  - url: https://www.newscientist.com/section/news/feed/
    label: New Scientist
  - url: https://www.nationalgeographic.com/feed
    label: National Geographic

  # Russian culture & language resources
  - url: https://www.themoscowtimes.com/rss/news
    label: Moscow Times
  - url: https://meduza.io/rss/en/all
    label: Meduza English

  # Language learning & education
  - url: https://blogs.transparent.com/russian/feed/
    label: Transparent Language Russian
  - url: https://www.russianpod101.com/feed/
    label: RussianPod101
  - url: https://www.fluentu.com/blog/russian/feed/
    label: FluentU Russian
  - url: https://russianwithmax.com/feed/
    label: Russian with Max

  # Kids & family vocabulary inspiration
  - url: https://www.sciencenewsforstudents.org/feed
    label: Science News for Students
  - url: https://www.wonderopolis.org/feed
    label: Wonderopolis (kids curiosity)

  # Canadian multiculturalism & diaspora life
  - url: https://www.cbc.ca/webfeed/rss/rss-canada
    label: CBC Canada
  - url: https://www.ukrinform.net/rss/block-lastnews
    label: Ukrinform (Ukrainian perspectives)

keywords:
  # Topics that generate good vocabulary themes
  - animals
  - food
  - weather
  - space
  - nature
  - family
  - school
  - sports
  - music
  - travel
  - technology
  - holiday
  - festival
  - tradition
  - cooking
  - ocean
  - mountains
  - winter
  - summer
  - garden
  - city
  - market
  - museum
  - library
  - park

llm:
  provider: xai
  model: grok-4.20-beta-0309-non-reasoning
  system_prompt_file: shows/prompts/privet_russian_system.txt
  digest_prompt_file: shows/prompts/privet_russian_digest.txt
  podcast_prompt_file: shows/prompts/privet_russian_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.75
  max_tokens: 4000
  podcast_max_tokens: 5000

tts:
  voice_id: gedzfqL7OGdPbwm0ynTP
  model: eleven_multilingual_v2
  stability: 0.65
  similarity_boost: 0.9
  style: 0.85
  use_speaker_boost: true
  max_chars: 5000

audio:
  music_file: assets/music/tesla_shorts_time.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

storage:
  provider: r2
  bucket: podcast-audio
  endpoint_env: R2_ENDPOINT_URL
  access_key_env: R2_ACCESS_KEY_ID
  secret_key_env: R2_SECRET_ACCESS_KEY
  public_base_url: "https://audio.nerranetwork.com"

publishing:
  host_name: "Оля"
  rss_file: privet_russian_podcast.rss
  rss_title: "Привет, Русский!"
  rss_description: "Learn Russian with Olya! A bilingual podcast for English speakers — kids and adult beginners. Each episode teaches vocabulary, phrases, and culture through fun, themed lessons. Привет means hello. Let's learn together!"
  rss_link: https://nerranetwork.com/ru/privet-russian.html
  rss_author: Nerra Network
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/privet-russian.jpg
  rss_category: Education
  guid_prefix: pr
  base_url: https://nerranetwork.com
  audio_subdir: digests/privet_russian
  summaries_json: digests/privet_russian/summaries_privet_russian.json
  summaries_podcast_name: privet_russian
  player_html: ru/privet-russian.html
  summaries_html: ru/privet-russian-summaries.html
  x_enabled: false
  x_env_prefix: ""

episode:
  prefix: PR
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/privet_russian
  mp3_glob: "PR_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Privyet|welcome to Privyet"
      title: "Привет! Welcome"
    - pattern: "word of the day|first word"
      title: "Word of the Day"
    - pattern: "vocabulary builder|let's learn more|more words"
      title: "Vocabulary Builder"
    - pattern: "grammar bite|grammar time|how Russian works"
      title: "Grammar Bite"
    - pattern: "culture corner|fun fact|did you know"
      title: "Culture Corner"
    - pattern: "practice time|quiz|remember what"
      title: "Practice Time"
    - pattern: "molodets|well done|poka|see you"
      title: "Closing"

newsletter:
  enabled: false
