name: "Models & Agents for Beginners"
slug: models_agents_beginners
description: "An AI podcast for beginners and teens — learn about models, agents, and the AI revolution in plain language. We explain the jargon, encourage experimentation, and help you understand the most exciting technology of our generation."

sources:
  # Major AI Labs & Research
  - url: https://openai.com/blog/rss.xml
    label: OpenAI Blog
  # Removed: ai.meta.com/blog/rss/ (404), anthropic.com/rss.xml (404),
  # mistral.ai/feed.xml (404) — lab blogs removed or moved

  # AI News & Analysis
  - url: https://www.technologyreview.com/feed/
    label: MIT Tech Review
  - url: https://techcrunch.com/category/artificial-intelligence/feed/
    label: TechCrunch AI
  - url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    label: The Verge AI
  - url: https://arstechnica.com/ai/feed/
    label: Ars Technica AI
  - url: https://www.wired.com/feed/tag/ai/latest/rss
    label: Wired AI
  - url: https://the-decoder.com/feed/
    label: The Decoder
  # Removed: artificialintelligence-news.com (captcha wall),
  # venturebeat.com (stale since Jan 2026)

  # Beginner-Friendly & Consumer AI
  - url: https://www.oneusefulthing.org/feed
    label: One Useful Thing (Ethan Mollick)
  - url: https://www.engadget.com/rss.xml
    label: Engadget
  - url: https://www.livescience.com/feeds/all
    label: Live Science
  - url: https://theconversation.com/us/articles.atom
    label: The Conversation
  # Google News — supplementary beginner-friendly AI coverage
  - url: "https://news.google.com/rss/search?q=ChatGPT+AI+chatbot+news&hl=en-US&gl=US&ceid=US:en"
    label: Google News ChatGPT
  - url: "https://news.google.com/rss/search?q=artificial+intelligence+beginners+explained&hl=en-US&gl=US&ceid=US:en"
    label: Google News AI Explained
  # Reddit — beginner-friendly AI communities
  - url: "https://www.reddit.com/r/ChatGPT/.rss"
    label: r/ChatGPT
  - url: "https://www.reddit.com/r/artificial/.rss"
    label: r/artificial
  # --- Round 4 additions (April 2026) ---

web_search_queries:
  - "AI news for beginners today"
  - "ChatGPT update news"
  - "AI tools new features today"

keywords:
  # Core AI concepts (beginner-accessible)
  - ai model
  - language model
  - ChatGPT
  - GPT
  - Claude
  - Gemini
  - Copilot
  - ai chatbot
  - ai assistant
  - ai image
  - ai video
  - ai art
  - ai music
  - ai writing
  - ai tutor
  - ai homework
  - image generation
  - text to speech
  - speech to text
  - multimodal
  - ai agent
  - ai tool
  - ai app
  - ai demo
  - ai free
  - prompt engineering
  - prompt tips
  - how to use ai
  - ai for students
  - ai for beginners
  - ai tutorial
  - learn ai
  - ai safety
  - ai ethics
  - deepfake
  - open source ai
  - Perplexity
  - Midjourney
  - Stable Diffusion
  - DALL-E
  - Sora
  - Runway
  - model release
  - model update
  - model comparison
  - ai news
  - new ai model
  # Broader terms for volume on slow AI news days
  - artificial intelligence
  - machine learning
  - automation
  - robot
  - neural network
  - LLM
  - OpenAI
  - Anthropic
  - Google AI
  - Meta AI

min_articles_skip: 2

llm:
  provider: xai
  system_prompt_file: shows/prompts/mab_system.txt
  digest_prompt_file: shows/prompts/mab_digest.txt
  podcast_prompt_file: shows/prompts/mab_podcast.txt
  digest_temperature: 0.4
  podcast_temperature: 0.75
  max_tokens: 5000
  podcast_max_tokens: 6000
  min_podcast_words: 1100

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  music_file: assets/music/tesla_shorts_time.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

publishing:
  rss_file: models_agents_beginners_podcast.rss
  rss_title: "Models & Agents for Beginners"
  rss_description: "A daily AI podcast for beginners and teens. Learn about AI models, agents, and the tools shaping our future — explained simply, with hands-on experiments you can try today. Every expert started as a beginner."
  rss_link: https://nerranetwork.com/models-agents-beginners.html
  rss_author: Patrick
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/models-agents-beginners.jpg
  rss_category: Technology
  guid_prefix: mab
  base_url: https://nerranetwork.com
  audio_subdir: digests/models_agents_beginners
  summaries_json: digests/models_agents_beginners/summaries_models_agents_beginners.json
  summaries_podcast_name: models_agents_beginners
  player_html: models-agents-beginners.html
  summaries_html: models-agents-beginners-summaries.html
  x_enabled: false
  x_env_prefix: ""

episode:
  prefix: MAB
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/models_agents_beginners
  mp3_glob: "MAB_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "welcome to Models and Agents for Beginners"
      title: "Welcome"
    - pattern: "big story|biggest news"
      title: "The Big Story"
    - pattern: "deep dive|how it works|under the hood"
      title: "Deep Dive: How It Works"
    - pattern: "cool stuff|cool tools|tools and models|try this"
      title: "Cool Stuff & Try This"
    - pattern: "quick bits|rapid fire|quick round"
      title: "Quick Bits"
    - pattern: "that's it for today|that's models and agents"
      title: "Closing"

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: BUTTONDOWN_API_KEY
  status: about_to_send
  tag: "Models & Agents for Beginners"

slow_news:
  enabled: true
  library_file: shows/segments/models_agents_beginners.json
  max_segments: 2
  cooldown_days: 30
