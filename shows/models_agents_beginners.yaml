llm:
  provider: xai
  model: grok-4
  system_prompt_file: shows/prompts/mab_system.txt
  digest_prompt_file: shows/prompts/mab_digest.txt
  podcast_prompt_file: shows/prompts/mab_podcast.txt
  digest_temperature: 0.4
  podcast_temperature: 0.75
  max_tokens: 4000

tts:
  provider: kokoro
  kokoro_voice: am_adam
  kokoro_speed: 0.92
  kokoro_lang: a
  max_chars: 5000

audio:
  music_file: assets/music/tesla_shorts_time.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

storage:
  provider: r2
  bucket: podcast-audio
  endpoint_env: R2_ENDPOINT_URL
  access_key_env: R2_ACCESS_KEY_ID
  secret_key_env: R2_SECRET_ACCESS_KEY
  public_base_url: "https://audio.nerranetwork.com"

publishing:
  rss_file: models_agents_beginners_podcast.rss
  rss_title: "Models & Agents for Beginners"
  rss_description: "A daily AI podcast for beginners and teens. Learn about AI models, agents, and the tools shaping our future — explained simply, with hands-on experiments you can try today. Every expert started as a beginner."
  rss_link: https://nerranetwork.com/models-agents-beginners.html
  rss_author: Patrick
  rss_email: contact@teslashortstime.com
  rss_image: https://nerranetwork.com/models-agents-beginners-podcast-image.jpg
  rss_category: Technology
  guid_prefix: mab
  base_url: https://nerranetwork.com
  audio_subdir: digests/models_agents_beginners
  summaries_json: digests/models_agents_beginners/summaries_models_agents_beginners.json
  summaries_podcast_name: models_agents_beginners
  player_html: models-agents-beginners.html
  summaries_html: models-agents-beginners-summaries.html
  x_enabled: false
  x_env_prefix: ""

episode:
  prefix: MAB
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/models_agents_beginners
  mp3_glob: "MAB_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "welcome to Models and Agents for Beginners"
      title: "Welcome"
    - pattern: "what's cool today|coolest thing"
      title: "What's Cool Today"
    - pattern: "big story|biggest news"
      title: "The Big Story"
    - pattern: "cool tools|tools and models"
      title: "Cool Tools & Models"
    - pattern: "try this|try it|experiment"
      title: "Try This at Home"
    - pattern: "quick bits|rapid fire|quick round"
      title: "Quick Bits"
    - pattern: "watch tomorrow|watch for|coming up"
      title: "What to Watch Tomorrow"
    - pattern: "That's Models and Agents for Beginners|that's it for today"
      title: "Closing"

newsletter:
  enabled: false
