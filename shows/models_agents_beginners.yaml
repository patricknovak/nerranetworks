name: "Models & Agents for Beginners"
slug: models_agents_beginners
description: "A daily AI podcast for beginners and teens — learn about models, agents, and the AI revolution in plain language. We explain the jargon, encourage experimentation, and help you understand the most exciting technology of our generation."

