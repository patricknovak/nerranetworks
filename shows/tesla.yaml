name: Tesla Shorts Time
slug: tesla
description: Daily Tesla news digest and podcast covering the latest developments, stock updates, and market analysis.

sources:
  - url: https://www.teslarati.com/feed/
    label: Teslarati
  - url: https://www.theverge.com/rss/tesla/index.xml
    label: The Verge
  - url: https://www.findmyelectric.com/feed/
    label: Find My Electric
  - url: https://cleantechnica.com/tag/tesla/feed/
    label: CleanTechnica
  - url: https://www.thedrive.com/category/tesla-news/feed
    label: The Drive
  - url: https://whatsuptesla.com/feed
    label: WhatsUpTesla
  - url: https://www.tesmanian.com/blogs/tesmanian-blog.atom
    label: Tesmanian
  - url: https://driveteslacanada.ca/feed/
    label: Drive Tesla Canada
  - url: https://carbuzz.com/feed
    label: CarBuzz
  - url: https://insideevs.com/rss/articles/all/
    label: InsideEVs
  - url: https://www.torquenews.com/rss.xml
    label: Torque News
  - url: https://electrek.co/guides/tesla/feed/
    label: Electrek

x_accounts:
  - handle: sawyermerrit
    label: Sawyer Merritt
    max_posts: 5
  - handle: tslaming
    label: TSLAming
    max_posts: 5

min_articles: 6
min_articles_skip: 5
min_audio_duration: 300

keywords:
  - tesla
  - tsla
  - model 3
  - model y
  - model s
  - model x
  - cybertruck
  - roadster
  - semi
  - robotaxi
  - optimus
  - fsd
  - full self-driving
  - autopilot
  - supercharger
  - giga
  - gigafactory
  - gigatexas
  - gigaberlin
  - gigashanghai
  - "4680"
  - lfp
  - hw4
  - hw5
  - ai5
  - tesla energy
  - powerwall
  - megapack
  - solar roof
  - tesla charging

llm:
  provider: xai
  system_prompt_file: shows/prompts/tesla_system.txt
  digest_prompt_file: shows/prompts/tesla_digest.txt
  podcast_prompt_file: shows/prompts/tesla_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.9
  max_tokens: 3500
  podcast_max_tokens: 8000
  min_podcast_words: 2200
  podcast_chain: true

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  music_file: assets/music/tesla_shorts_time.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

publishing:
  rss_file: podcast.rss
  rss_title: Tesla Shorts Time Daily
  rss_description: A daily podcast covering the latest Tesla news, stock prices, and industry insights.
  rss_summary: Daily Tesla news digest and podcast covering the latest developments, stock updates, and market analysis.
  rss_link: https://nerranetwork.com/tesla.html
  rss_author: Patrick
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/tesla-shorts-time.jpg
  rss_category: Technology
  guid_prefix: tesla-shorts-time
  base_url: https://nerranetwork.com
  audio_subdir: digests/tesla_shorts_time
  summaries_json: digests/tesla_shorts_time/summaries_tesla.json
  summaries_podcast_name: tesla
  x_enabled: true
  x_env_prefix: "X_"

episode:
  prefix: Tesla_Shorts_Time_Pod
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/tesla_shorts_time
  mp3_glob: "Tesla_Shorts_Time_Pod_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Welcome.*Tesla Shorts Time"
      title: "Introduction"
    - pattern: "Top \\d+|biggest.*stories|let.?s.*get into"
      title: "Top Stories"
    - pattern: "X Takeover|takeover"
      title: "Tesla X Takeover"
    - pattern: "one thing worth watching|challenge worth discussing|Short Spot|short.?seller"
      title: "The Counterpoint"
    - pattern: "First Principles"
      title: "First Principles"
    - pattern: "Before we go|before we wrap|before I go"
      title: "Tomorrow Teaser"
    - pattern: "That's Tesla Shorts Time|that.?s.*for today|until next time"
      title: "Closing"

slow_news:
  enabled: true
  library_file: shows/segments/tesla.json
  max_segments: 2
  cooldown_days: 30

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: TESLA_NEWSLETTER_API_KEY
  status: about_to_send

