# Network-wide defaults for all Nerra Network shows.
#
# Per-show YAML configs inherit these values. Any key set in a show's
# own YAML file overrides the default. Nested keys are merged one level
# deep (e.g. a show can override just `tts.stability` without losing
# the other tts defaults).
#
# Usage: engine/config.py load_config() loads this file first, then
# deep-merges the show-specific YAML on top.

llm:
  provider: xai
  model: grok-4.20-non-reasoning
  digest_temperature: 0.5
  podcast_temperature: 0.7
  max_tokens: 3500
  podcast_max_tokens: 8000
  min_podcast_words: 1500
  podcast_chain: false
  # Refusal fallback — same price as the primary, different refusal
  # thresholds. Replaces the previous grok-4 fallback (2.5x output cost).
  fallback_model: grok-4.20-reasoning
  # Synthesizer (weekly newsletter, monthly report, cross-show briefing).
  # Reasoning variant is same-price, benefits longer-form synthesis.
  synth_model: grok-4.20-reasoning
  synth_max_tokens: 8000
  synth_temperature: 0.4
  # Episode quality reviewer — fast/cheap variant, headroom for critique.
  reviewer_model: grok-4-1-fast-non-reasoning
  reviewer_max_tokens: 1500
  reviewer_temperature: 0.3

tts:
  provider: elevenlabs
  voice_id: dTrBzPvD2GpAqkk1MUzA
  model: eleven_flash_v2_5
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000
  apply_text_normalization: "on"

audio:
  min_audio_duration: 180
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.5
  overlap_volume: 0.4
  fade_volume: 0.3
  outro_volume: 0.3

storage:
  provider: r2
  bucket: podcast-audio
  endpoint_env: R2_ENDPOINT_URL
  access_key_env: R2_ACCESS_KEY_ID
  secret_key_env: R2_SECRET_ACCESS_KEY
  public_base_url: "https://audio.nerranetwork.com"

publishing:
  rss_author: Nerra Network
  rss_email: patrick@planetterrian.com
  base_url: https://nerranetwork.com
  host_name: Patrick

analytics:
  # OP3 (https://op3.dev) is a free, open podcast analytics service.
  # Wrapping enclosure URLs proxies downloads through OP3 so we get
  # listener stats from podcast apps (Apple, Spotify, Pocket Casts, etc.)
  # that don't expose this data otherwise. Existing episode URLs in
  # RSS feeds are preserved; only NEW episodes get the OP3 prefix.
  enabled: true
  prefix_url: "https://op3.dev/e/"

newsletter:
  enabled: false
  platform: buttondown
  status: about_to_send

chapters:
  enabled: true

content_tracking:
  enabled: true
  max_days: 14

youtube:
  # Off by default — flip per-show in the show YAML once an OAuth refresh
  # token is provisioned for that channel.
  enabled: false
  # "en" = upload to the English Nerra Network channel using
  # YOUTUBE_REFRESH_TOKEN_EN. "ru" = Russian channel
  # using YOUTUBE_REFRESH_TOKEN_RU.
  channel: en
  # YouTube category ID (24=Entertainment, 25=News, 27=Education,
  # 28=Science & Tech). Override per-show when a more specific bucket fits.
  category_id: 28
  default_language: en
  # "public" once we've validated a few uploads via "unlisted".
  privacy_status: public
  # Per-episode rendering toggles.
  publish_long_form: true
  publish_shorts: true
  # Shorts clip pulled from the voice track only (skips music intro);
  # keep < 60s so YouTube treats it as a Short.
  short_duration_seconds: 55
  # Network-wide tags appended to per-show tags.
  tags:
    - nerra network
    - podcast
    - ai podcast
  # Disclosure footer appended to every video description. The API also
  # sets status.containsSyntheticMedia=True on every upload, which is the
  # field YouTube uses to render the "Altered or synthetic content" label.
  synthetic_disclosure: |
    AI Disclosure: This podcast is curated by Patrick but uses AI-generated
    voice synthesis (ElevenLabs) for the narration. Editorial selection,
    summaries, and analysis are written from primary sources by
    Nerra Network. Learn more: https://nerranetwork.com/about
