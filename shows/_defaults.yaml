# Network-wide defaults for all Nerra Network shows.
#
# Per-show YAML configs inherit these values. Any key set in a show's
# own YAML file overrides the default. Nested keys are merged one level
# deep (e.g. a show can override just `tts.stability` without losing
# the other tts defaults).
#
# Usage: engine/config.py load_config() loads this file first, then
# deep-merges the show-specific YAML on top.

llm:
  provider: xai
  model: grok-4.20-beta-0309-non-reasoning
  digest_temperature: 0.5
  podcast_temperature: 0.7
  max_tokens: 3500
  podcast_max_tokens: 8000
  min_podcast_words: 1500

tts:
  provider: elevenlabs
  voice_id: dTrBzPvD2GpAqkk1MUzA
  model: eleven_turbo_v2_5
  stability: 0.65
  similarity_boost: 0.9
  style: 0.85
  use_speaker_boost: true
  max_chars: 5000

audio:
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.5
  overlap_volume: 0.4
  fade_volume: 0.3
  outro_volume: 0.3

storage:
  provider: r2
  bucket: podcast-audio
  endpoint_env: R2_ENDPOINT_URL
  access_key_env: R2_ACCESS_KEY_ID
  secret_key_env: R2_SECRET_ACCESS_KEY
  public_base_url: "https://audio.nerranetwork.com"

publishing:
  rss_author: Nerra Network
  rss_email: patrick@planetterrian.com
  base_url: https://nerranetwork.com
  host_name: Patrick

analytics:
  enabled: false
  prefix_url: "https://op3.dev/e/"

newsletter:
  enabled: false
  platform: buttondown
  status: about_to_send

chapters:
  enabled: true

content_tracking:
  enabled: true
  max_days: 14
