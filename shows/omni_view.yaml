llm:
  provider: xai
  system_prompt_file: shows/prompts/omni_view_system.txt
  digest_prompt_file: shows/prompts/omni_view_digest.txt
  podcast_prompt_file: shows/prompts/omni_view_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.7
  max_tokens: 4000
  podcast_max_tokens: 8000
  min_podcast_words: 1800

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  music_file: assets/music/LubechangeOilers.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.5
  overlap_volume: 0.4
  fade_volume: 0.3
  outro_volume: 0.3

publishing:
  rss_file: omni_view_podcast.rss
  rss_title: "Omni View - Balanced News Perspectives"
  rss_description: "Daily balanced news summaries presenting multiple perspectives on the stories that matter. Countering media bias through diverse sources and critical analysis."
  rss_link: https://nerranetwork.com/omni-view.html
  rss_author: Omni View
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/omni-view.jpg
  rss_category: News
  guid_prefix: omni-view
  base_url: https://nerranetwork.com
  audio_subdir: digests/omni_view
  summaries_json: digests/omni_view/summaries_omni.json
  summaries_podcast_name: omni
  x_enabled: true
  x_env_prefix: "X_"

episode:
  prefix: Omni_View
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/omni_view
  mp3_glob: "Omni_View_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "This is Omni View|Welcome.*Omni View|Omni View.*episode"
      title: "Introduction"
    - pattern: "Shifting now to|Meanwhile|first story|first up"
      title: "Main Stories"
    - pattern: "understanding the issue|deeper look|let's understand"
      title: "Understanding the Issue"
    - pattern: "Before we go|before we wrap"
      title: "Tomorrow Teaser"
    - pattern: "That's Omni View|that.?s.*for today|until next time"
      title: "Closing"

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: BUTTONDOWN_API_KEY
  status: about_to_send
  tag: "Omni View"

slow_news:
  enabled: true
  library_file: shows/segments/omni_view.json
  max_segments: 2
  cooldown_days: 30

youtube:
  enabled: false                # Phase 2 — flip after quota raise
  channel: en
  category_id: 25               # News & Politics
  default_language: en
  tags:
    - news
    - balanced news
    - news podcast

