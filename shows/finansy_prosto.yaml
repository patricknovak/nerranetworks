llm:
  provider: xai
  system_prompt_file: shows/prompts/fp_system.txt
  digest_prompt_file: shows/prompts/fp_digest.txt
  podcast_prompt_file: shows/prompts/fp_podcast.txt
  digest_temperature: 0.4
  podcast_temperature: 0.75
  max_tokens: 5000
  podcast_max_tokens: 6000
  min_podcast_words: 1100

tts:
  voice_id: gedzfqL7OGdPbwm0ynTP
  language_code: ru
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  music_file: assets/music/tesla_shorts_time.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

publishing:
  host_name: "Оля"
  rss_language: ru
  rss_file: finansy_prosto_podcast.rss
  rss_title: "Финансы Просто"
  rss_description: "Ежедневный подкаст о финансах на русском языке для женщин в Канаде. Ведущая Оля объясняет инвестиции, сбережения, бюджет и финансовую грамотность — просто и понятно. Каждый выпуск — практические советы, новости и ресурсы для финансовой независимости."
  rss_link: https://nerranetwork.com/ru/finansy-prosto.html
  rss_author: Nerra Network
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/finansy-prosto.jpg
  rss_category: Business
  guid_prefix: fp
  base_url: https://nerranetwork.com
  audio_subdir: digests/finansy_prosto
  summaries_json: digests/finansy_prosto/summaries_finansy_prosto.json
  summaries_podcast_name: finansy_prosto
  player_html: ru/finansy-prosto.html
  summaries_html: ru/finansy-prosto-summaries.html
  x_enabled: false
  x_env_prefix: ""

episode:
  prefix: FP
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/finansy_prosto
  mp3_glob: "FP_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Финансы Просто|добро пожаловать"
      title: "Приветствие"
    - pattern: "главная тема|главная новость|самое важное"
      title: "Главная тема"
    - pattern: "как это работает|разбираемся|давайте разберёмся|объясни как подруге"
      title: "Как это работает"
    - pattern: "попробуйте сами|практический совет|на практике"
      title: "Практические советы"
    - pattern: "коротко и ясно|быстрые новости"
      title: "Коротко и ясно"
    - pattern: "на сегодня всё|до завтра"
      title: "Завершение"

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: BUTTONDOWN_API_KEY
  status: about_to_send
  # Buttondown rejects tags with no ASCII letter/number, so we use the
  # transliterated form rather than the Cyrillic show display name.
  tag: "Finansy Prosto"

slow_news:
  enabled: true
  library_file: shows/segments/finansy_prosto.json
  max_segments: 2
  cooldown_days: 30

