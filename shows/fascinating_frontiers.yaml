llm:
  provider: xai
  model: grok-4
  system_prompt_file: shows/prompts/fascinating_frontiers_system.txt
  digest_prompt_file: shows/prompts/fascinating_frontiers_digest.txt
  podcast_prompt_file: shows/prompts/fascinating_frontiers_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.75
  max_tokens: 3500

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  model: eleven_turbo_v2_5
  stability: 0.65
  similarity_boost: 0.9
  style: 0.85
  use_speaker_boost: true
  max_chars: 5000

audio:
  music_file: assets/music/fascinatingfrontiers.mp3
  background_music_file: assets/music/fascinatingfrontiers_bg.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 27.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

publishing:
  rss_file: fascinating_frontiers_podcast.rss
  rss_title: Fascinating Frontiers
  rss_description: "Daily space and astronomy news digest. Bringing the wonders of space exploration and astronomy discoveries to everyone."
  rss_summary: "Daily space and astronomy news. Curiosity, exploration, scientific accuracy, and inspiration."
  rss_link: https://planetterrian.com
  rss_author: Patrick
  rss_email: contact@planetterrian.com
  rss_image: "https://raw.githubusercontent.com/patricknovak/Tesla-shorts-time/main/Fascinating%20Frontiers-3000x3000.jpg"
  rss_category: Science
  guid_prefix: fascinating-frontiers
  base_url: https://raw.githubusercontent.com/patricknovak/Tesla-shorts-time/main
  audio_subdir: digests/fascinating_frontiers
  summaries_json: digests/fascinating_frontiers/summaries_space.json
  summaries_podcast_name: space
  x_enabled: true
  x_env_prefix: "PLANETTERRIAN_X_"

episode:
  prefix: Fascinating_Frontiers
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/fascinating_frontiers
  mp3_glob: "Fascinating_Frontiers_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Welcome to Fascinating Frontiers"
      title: "Introduction"
    - pattern: "Cosmic Spotlight"
      title: "Cosmic Spotlight"
    - pattern: "Before we go|Next time"
      title: "Tomorrow Teaser"
    - pattern: "That's Fascinating Frontiers"
      title: "Closing"

storage:
  provider: r2
  bucket: podcast-audio
  endpoint_env: R2_ENDPOINT_URL
  access_key_env: R2_ACCESS_KEY_ID
  secret_key_env: R2_SECRET_ACCESS_KEY
  public_base_url: "https://audio.nerranetwork.com"
