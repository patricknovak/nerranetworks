llm:
  provider: xai
  model: grok-4
  system_prompt_file: shows/prompts/planetterrian_system.txt
  digest_prompt_file: shows/prompts/planetterrian_digest.txt
  podcast_prompt_file: shows/prompts/planetterrian_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.75
  max_tokens: 3500

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  model: eleven_turbo_v2_5
  stability: 0.65
  similarity_boost: 0.9
  style: 0.85
  use_speaker_boost: true
  max_chars: 5000

audio:
  music_file: assets/music/oilers-pride.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

storage:
  provider: r2
  bucket: podcast-audio
  endpoint_env: R2_ENDPOINT_URL
  access_key_env: R2_ACCESS_KEY_ID
  secret_key_env: R2_SECRET_ACCESS_KEY
  public_base_url: "https://audio.nerranetwork.com"

publishing:
  rss_file: planetterrian_podcast.rss
  rss_title: Planetterrian Daily
  rss_description: "Daily science, longevity, and health discoveries. A tribe of forward-thinking innovators passionate about the planet, intertwining technology and compassion."
  rss_summary: "Daily science, longevity, and health discoveries. Technology as a force for good, sustainability, and environmental consciousness."
  rss_link: https://planetterrian.com
  rss_author: Patrick
  rss_email: contact@planetterrian.com
  rss_image: https://raw.githubusercontent.com/patricknovak/Tesla-shorts-time/main/planetterrian-podcast-image.jpg
  rss_category: Science
  guid_prefix: planetterrian-daily
  base_url: https://raw.githubusercontent.com/patricknovak/Tesla-shorts-time/main
  audio_subdir: digests/planetterrian
  summaries_json: digests/planetterrian/summaries_planet.json
  summaries_podcast_name: planet
  x_enabled: true
  x_env_prefix: "PLANETTERRIAN_X_"

episode:
  prefix: Planetterrian_Daily
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/planetterrian
  mp3_glob: "Planetterrian_Daily_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Welcome to Planetterrian"
      title: "Introduction"
    - pattern: "Planetterrian Spotlight|Spotlight"
      title: "Planetterrian Spotlight"
    - pattern: "Before we go|Next time"
      title: "Tomorrow Teaser"
    - pattern: "That's Planetterrian"
      title: "Closing"

