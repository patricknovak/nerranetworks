llm:
  provider: xai
  system_prompt_file: shows/prompts/planetterrian_system.txt
  digest_prompt_file: shows/prompts/planetterrian_digest.txt
  podcast_prompt_file: shows/prompts/planetterrian_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.70
  max_tokens: 3500
  podcast_max_tokens: 8000
  min_podcast_words: 2000
  podcast_chain: true

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  music_file: assets/music/oilers-pride.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

publishing:
  rss_file: planetterrian_podcast.rss
  rss_title: Planetterrian Daily
  rss_description: "Daily science, longevity, and health discoveries across neuroscience, microbiome, cellular aging biology, sleep research, nutrition science, genetics, and regenerative biology. We deliberately minimize drug-industry dealmaking in favour of the broader research shaping how we understand the body."
  rss_summary: "Daily science, longevity, and health discoveries — neuroscience, microbiome, sleep, nutrition, genetics, and cellular aging biology. Research-first, not pharma-trade."
  rss_link: https://nerranetwork.com/planetterrian.html
  rss_author: Patrick
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/planetterrian-daily.jpg
  rss_category: Science
  guid_prefix: planetterrian-daily
  base_url: https://nerranetwork.com
  audio_subdir: digests/planetterrian
  summaries_json: digests/planetterrian/summaries_planet.json
  summaries_podcast_name: planet
  x_enabled: true
  x_env_prefix: "PLANETTERRIAN_X_"

episode:
  prefix: Planetterrian_Daily
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/planetterrian
  mp3_glob: "Planetterrian_Daily_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Welcome.*Planet|Planet-terry-an.*episode"
      title: "Introduction"
    - pattern: "Planetterrian Spotlight|Planet-terry-an Spotlight|Spotlight"
      title: "Planetterrian Spotlight"
    - pattern: "science deep dive|deep dive|under the microscope"
      title: "Science Deep Dive"
    - pattern: "Before we go|Next time|before we wrap"
      title: "Tomorrow Teaser"
    - pattern: "That's Planet|that.?s.*for today|until next time"
      title: "Closing"

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: BUTTONDOWN_API_KEY
  status: about_to_send
  tag: "Planetterrian Daily"

slow_news:
  enabled: true
  library_file: shows/segments/planetterrian.json
  max_segments: 2
  cooldown_days: 30

