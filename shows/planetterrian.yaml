name: Planetterrian Daily
slug: planetterrian
description: "Longevity, biotech, genetics, and medicine — breakthroughs that extend healthy human lifespan. Daily briefings on Nature/Science papers, clinical trials, gene therapy, CRISPR, and the biotech startups shaping the next decade of health."

sources:
  - url: https://www.nature.com/nature.rss
    label: Nature
  - url: https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=science
    label: Science Magazine
  - url: https://www.nature.com/nbt.rss
    label: Nature Biotech
  - url: https://www.nature.com/nm.rss
    label: Nature Medicine
  - url: https://www.nature.com/nmeth.rss
    label: Nature Methods
  - url: https://phys.org/rss-feed/
    label: Phys.org
  - url: https://arstechnica.com/science/feed/
    label: Ars Technica Science
  - url: https://www.sciencedaily.com/rss/all.xml
    label: ScienceDaily
  - url: https://www.sciencenews.org/feed
    label: Science News
  - url: https://www.quantamagazine.org/feed/
    label: Quanta Magazine
  - url: https://www.technologyreview.com/feed/
    label: MIT Tech Review
  - url: https://www.statnews.com/feed/
    label: STAT News
  # longevity.technology/feed/ returns empty — removed
  - url: https://www.lifespan.io/feed/
    label: Lifespan.io
  - url: https://news.harvard.edu/gazette/feed/
    label: Harvard Gazette
  - url: https://news.mit.edu/rss/topic/health
    label: MIT Health
  # Google News — supplementary broad coverage
  - url: "https://news.google.com/rss/search?q=longevity+anti-aging+science&hl=en-US&gl=US&ceid=US:en"
    label: Google News Longevity
  - url: "https://news.google.com/rss/search?q=biotechnology+gene+therapy+breakthrough&hl=en-US&gl=US&ceid=US:en"
    label: Google News Biotech
  - url: "https://news.google.com/rss/search?q=medical+science+breakthrough+discovery&hl=en-US&gl=US&ceid=US:en"
    label: Google News Medical Science
  # Reddit — community science coverage
  - url: "https://www.reddit.com/r/longevity/.rss"
    label: r/longevity
  - url: "https://www.reddit.com/r/science/.rss"
    label: r/science
  - url: "https://www.reddit.com/r/biotech/.rss"
    label: r/biotech
  # --- Round 4 additions (April 2026) ---
  - url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=biochemistry"
    label: bioRxiv Biochemistry
  - url: "https://connect.biorxiv.org/biorxiv_xml.php?subject=genetics"
    label: bioRxiv Genetics
  - url: https://www.sciencedaily.com/rss/health_medicine/medical_topics.xml
    label: ScienceDaily Medical
  - url: https://www.fiercebiotech.com/rss/xml
    label: Fierce Biotech
  - url: https://endpts.com/feed/
    label: Endpoints News

web_search_queries:
  - "longevity anti-aging research news"
  - "biotechnology breakthrough news today"
  - "medical science discovery"
  - "CRISPR gene therapy news"

min_articles_skip: 2

keywords:
  - longevity
  - anti-aging
  - aging
  - lifespan
  - healthspan
  - biotechnology
  - genetics
  - genomics
  - CRISPR
  - gene therapy
  - medicine
  - medical
  - health
  - wellness
  - nutrition
  - diet
  - research
  - study
  - clinical trial
  - discovery
  - breakthrough
  - science
  - scientific
  - biotech
  - cancer
  - disease
  - treatment
  - therapy
  - vaccine
  - brain
  - neuroscience
  - cognitive
  - mental health
  - exercise
  - fitness
  - metabolism
  - mitochondria

llm:
  provider: xai
  system_prompt_file: shows/prompts/planetterrian_system.txt
  digest_prompt_file: shows/prompts/planetterrian_digest.txt
  podcast_prompt_file: shows/prompts/planetterrian_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.70
  max_tokens: 3500
  podcast_max_tokens: 8000
  min_podcast_words: 2000
  podcast_chain: true

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  music_file: assets/music/oilers-pride.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

publishing:
  rss_file: planetterrian_podcast.rss
  rss_title: Planetterrian Daily
  rss_description: "Daily science, longevity, and health discoveries. A tribe of forward-thinking innovators passionate about the planet, intertwining technology and compassion."
  rss_summary: "Daily science, longevity, and health discoveries. Technology as a force for good, sustainability, and environmental consciousness."
  rss_link: https://nerranetwork.com/planetterrian.html
  rss_author: Patrick
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/planetterrian-daily.jpg
  rss_category: Science
  guid_prefix: planetterrian-daily
  base_url: https://nerranetwork.com
  audio_subdir: digests/planetterrian
  summaries_json: digests/planetterrian/summaries_planet.json
  summaries_podcast_name: planet
  x_enabled: true
  x_env_prefix: "PLANETTERRIAN_X_"

episode:
  prefix: Planetterrian_Daily
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/planetterrian
  mp3_glob: "Planetterrian_Daily_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Welcome.*Planet|Planet-terry-an.*episode"
      title: "Introduction"
    - pattern: "Planetterrian Spotlight|Planet-terry-an Spotlight|Spotlight"
      title: "Planetterrian Spotlight"
    - pattern: "science deep dive|deep dive|under the microscope"
      title: "Science Deep Dive"
    - pattern: "Before we go|Next time|before we wrap"
      title: "Tomorrow Teaser"
    - pattern: "That's Planet|that.?s.*for today|until next time"
      title: "Closing"

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: PLANETTERRIAN_NEWSLETTER_API_KEY
  status: about_to_send

slow_news:
  enabled: true
  library_file: shows/segments/planetterrian.json
  max_segments: 2
  cooldown_days: 30

