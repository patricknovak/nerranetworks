llm:
  provider: xai
  system_prompt_file: shows/prompts/models_agents_system.txt
  digest_prompt_file: shows/prompts/models_agents_digest.txt
  podcast_prompt_file: shows/prompts/models_agents_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.7
  max_tokens: 3500
  podcast_max_tokens: 8000

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  music_file: assets/music/tesla_shorts_time.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.6
  overlap_volume: 0.5
  fade_volume: 0.4
  outro_volume: 0.4

publishing:
  rss_file: models_agents_podcast.rss
  rss_title: "Models & Agents"
  rss_description: "Daily AI briefing covering new model releases, agent frameworks, and the latest developments in AI. Not the models and agents you are thinking about! Stay on top of the most exciting developments of our generation."
  rss_link: https://nerranetwork.com/models-agents.html
  rss_author: Patrick
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/models-agents.jpg
  rss_category: Technology
  guid_prefix: models-agents
  base_url: https://nerranetwork.com
  audio_subdir: digests/models_agents
  summaries_json: digests/models_agents/summaries_models_agents.json
  summaries_podcast_name: models_agents
  player_html: models-agents.html
  summaries_html: models-agents-summaries.html
  x_enabled: false
  x_env_prefix: ""

episode:
  prefix: Models_Agents
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/models_agents
  mp3_glob: "Models_Agents_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "welcome.*Models and Agents|Models and Agents.*episode"
      title: "Introduction"
    - pattern: "what you need to know|key summary"
      title: "What You Need to Know"
    - pattern: "top story|main event"
      title: "Top Story"
    - pattern: "model updates|model news"
      title: "Model Updates"
    - pattern: "agent|tool developments|agentic"
      title: "Agent & Tool Developments"
    - pattern: "practical|community|open.source"
      title: "Practical & Community"
    - pattern: "under the hood|deep dive|technical deep dive"
      title: "Under the Hood"
    - pattern: "things to try|try this week"
      title: "Things to Try"
    - pattern: "on the horizon|coming up|what's coming"
      title: "On the Horizon"
    - pattern: "Before we go|before we wrap"
      title: "Tomorrow Teaser"
    - pattern: "That's Models and Agents|that.?s.*for today|until next time"
      title: "Closing"

slow_news:
  enabled: true
  library_file: shows/segments/models_agents.json
  max_segments: 2
  cooldown_days: 30

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: MODELS_AGENTS_NEWSLETTER_API_KEY
  status: about_to_send

