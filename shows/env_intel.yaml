name: Environmental Intelligence
slug: env_intel
description: Daily environmental regulatory, science, and compliance briefing for Canadian environmental professionals covering all provinces, territories, and federal jurisdictions.

sources:
  # British Columbia
  - url: https://news.gov.bc.ca/ministries/environment-and-parks/feed
    label: BC Ministry of Environment
  - url: https://news.gov.bc.ca/ministries/energy-and-climate-solutions/feed
    label: BC Energy and Climate Solutions
  - url: https://news.gov.bc.ca/ministries/water-land-and-resource-stewardship/feed
    label: BC Water Land and Resource Stewardship
  - url: https://news.gov.bc.ca/ministries/emergency-management-and-climate-readiness/feed
    label: BC Emergency Management

  # Alberta — note: alberta.ca and aer.ca no longer offer standard RSS feeds.
  # Coverage sourced via Canadian Geographic, The Narwhal, and CBC Canada feeds.

  # Ontario — note: news.ontario.ca/en/rss returns HTML/JS, not RSS.
  # Coverage sourced via CBC Canada, National Observer, and general feeds.

  # Federal Canada
  - url: https://www.gazette.gc.ca/rss/p1-eng.xml
    label: Canada Gazette Part I
  - url: https://www.gazette.gc.ca/rss/p2-eng.xml
    label: Canada Gazette Part II

  # US EPA (cross-border relevance)
  - url: https://www.epa.gov/newsreleases/search/rss
    label: US EPA

  # Science Journals
  - url: https://www.nature.com/nclimate.rss
    label: Nature Climate Change
  - url: https://www.sciencedaily.com/rss/top/environment.xml
    label: ScienceDaily Environment
  - url: https://www.science.org/rss/news_current.xml
    label: Science AAAS

  # Canadian Environmental News
  - url: https://thenarwhal.ca/feed/
    label: The Narwhal
  - url: https://thetyee.ca/rss2.xml
    label: The Tyee
  - url: https://www.cbc.ca/webfeed/rss/rss-canada
    label: CBC Canada
  - url: https://www.desmog.com/feed/
    label: DeSmog
  # General Environmental / Climate
  - url: https://www.nationalobserver.com/feed
    label: National Observer
  - url: https://www.carbonbrief.org/feed/
    label: Carbon Brief
  - url: https://yaleclimateconnections.org/feed/
    label: Yale Climate Connections
  - url: https://grist.org/feed/
    label: Grist
  - url: https://insideclimatenews.org/feed/
    label: Inside Climate News
  - url: https://eponline.com/rss-feeds/News.aspx
    label: Environmental Protection Online

keywords:
  - contaminated sites
  - remediation
  - site assessment
  - groundwater
  - soil contamination
  - environmental management act
  - contaminated sites regulation
  - CSR
  - EMA
  - CEPA
  - ISO 17025
  - environmental assessment
  - impact assessment
  - water quality
  - air quality
  - emissions
  - climate change
  - carbon
  - greenhouse gas
  - GHG
  - permit
  - compliance
  - enforcement
  - regulation
  - amendment
  - brownfield
  - risk assessment
  - vapour intrusion
  - PFAS
  - per- and polyfluoroalkyl
  - hazardous waste
  - spill
  - cleanup
  - monitoring well
  - aquifer
  - watershed
  - effluent
  - discharge
  - environmental monitoring
  # Pan-Canadian additions
  - CCME
  - federal impact assessment
  - Alberta Energy Regulator
  - AER
  - Ontario environmental
  - Quebec environment
  - Saskatchewan environment
  - Manitoba environment
  - provincial regulation
  - interprovincial
  - pipeline
  - tailings
  - oil sands
  - mining environmental
  - fisheries act
  - species at risk
  # Broader terms for volume on slow news days
  - environment
  - environmental
  - pollution
  - sustainability
  - conservation
  - biodiversity
  - clean energy
  - renewable

min_articles: 5
min_articles_skip: 2

llm:
  provider: xai
  model: grok-4.20-beta-0309-non-reasoning
  system_prompt_file: shows/prompts/env_intel_system.txt
  digest_prompt_file: shows/prompts/env_intel_digest.txt
  podcast_prompt_file: shows/prompts/env_intel_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.7
  max_tokens: 3500
  podcast_max_tokens: 8000

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  model: eleven_turbo_v2_5
  stability: 0.65
  similarity_boost: 0.9
  style: 0.55
  use_speaker_boost: true
  max_chars: 4500

audio:
  music_file: assets/music/tesla_shorts_time.mp3
  transition_sting: assets/music/transition_sting.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.4
  overlap_volume: 0.3
  fade_volume: 0.25
  outro_volume: 0.3

storage:
  provider: r2
  bucket: podcast-audio
  endpoint_env: R2_ENDPOINT_URL
  access_key_env: R2_ACCESS_KEY_ID
  secret_key_env: R2_SECRET_ACCESS_KEY
  public_base_url: "https://audio.nerranetwork.com"

publishing:
  rss_file: env_intel_podcast.rss
  rss_title: "Environmental Intelligence"
  rss_description: "Daily environmental regulatory, science, and compliance briefing for Canadian environmental professionals. Covering contaminated sites, remediation, environmental law, and climate policy across all provinces, territories, and federal jurisdictions."
  rss_link: https://nerranetwork.com/env-intel.html
  rss_author: Environmental Intelligence
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/environmental-intelligence.jpg
  rss_category: Science
  guid_prefix: env-intel
  base_url: https://nerranetwork.com
  audio_subdir: digests/env_intel
  summaries_json: digests/env_intel/summaries_env_intel.json
  summaries_podcast_name: env_intel
  player_html: env-intel.html
  summaries_html: env-intel-summaries.html
  x_enabled: false
  x_env_prefix: ""

episode:
  prefix: Env_Intel
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/env_intel
  mp3_glob: "Env_Intel_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "This is Environmental Intelligence"
      title: "Introduction"
    - pattern: "executive summary|here's what matters"
      title: "Executive Summary"
    - pattern: "lead story|centrepiece|most significant"
      title: "Lead Story"
    - pattern: "regulatory|policy watch"
      title: "Regulatory & Policy Watch"
    - pattern: "science|technical"
      title: "Science & Technical"
    - pattern: "industry|practice"
      title: "Industry & Practice"
    - pattern: "practitioner deep dive|deep dive|under the hood"
      title: "Practitioner Deep Dive"
    - pattern: "action items|if you're working on"
      title: "Action Items"
    - pattern: "week ahead|mark your calendar"
      title: "Week Ahead"
    - pattern: "Before we wrap|Tomorrow"
      title: "Tomorrow Teaser"
    - pattern: "That's Environmental Intelligence"
      title: "Closing"

slow_news:
  enabled: true
  library_file: shows/segments/env_intel.json
  max_segments: 2
  cooldown_days: 30

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: ENVIRONMENTAL_INTELLIGENCE_NEWSLETTER_API_KEY
  status: about_to_send

