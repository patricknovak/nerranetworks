# Blocked RSS Sources
# -------------------
# Sources listed here have been tried and rejected for quality reasons.
# check_sources.py will flag any show config that references a blocked URL.
# This prevents bad sources from being accidentally re-added.
#
# Format:
#   - url: <feed URL or domain fragment>
#     reason: <why it was blocked>
#     date_blocked: <YYYY-MM-DD>

blocked:
  - url: finance.yahoo.com
    reason: Low-quality aggregated headlines, clickbait, unreliable article quality
    date_blocked: "2026-03-16"

  - url: seekingalpha.com
    reason: Paywalled content, speculative opinion pieces, inconsistent quality
    date_blocked: "2026-03-16"

  - url: electrek.co
    reason: Sensationalized headlines, inconsistent editorial standards
    date_blocked: "2026-03-16"

  - url: thenarwhal.ca
    reason: "RSS feed broken (HTTP 415 Unsupported Media Type since 2026-04-05). Re-evaluate if fixed."
    date_blocked: "2026-04-16"

  # -------------------------------------------------------------------
  # Russia-based sources — sensitivity policy
  # -------------------------------------------------------------------
  # Olya (host of Russian shows) is a Ukrainian Russian speaker.
  # We avoid Russia-based platforms that could be perceived as
  # supporting Russian state interests or normalizing Russian
  # state-controlled financial/tech infrastructure.
  # Independent exile media (Meduza, Moscow Times) are acceptable
  # as they operate outside Russia and are explicitly anti-Kremlin.
  # -------------------------------------------------------------------

