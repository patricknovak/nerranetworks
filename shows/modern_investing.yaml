name: "Modern Investing Techniques"
slug: modern_investing
description: "Daily investing podcast using AI analysis and modern tools to identify opportunities, track simulated trades, and teach strategies that aim to outperform index funds. Focused on Canadian and US markets."

sources:
  # Canadian Markets & Finance
  - url: https://financialpost.com/feed
    label: Financial Post
  - url: https://www.bnnbloomberg.ca/arc/outboundfeeds/rss/?outputType=xml
    label: BNN Bloomberg
  - url: https://www.theglobeandmail.com/arc/outboundfeeds/rss/category/investing/
    label: Globe and Mail Investing
  - url: https://www.moneysense.ca/feed/
    label: MoneySense
  - url: https://www.fool.ca/feed/
    label: Motley Fool Canada

  # US Markets & Finance
  # yahoo finance removed — in _blocked_sources.yaml (low-quality aggregated headlines)
  - url: https://www.fool.com/feeds/index.aspx
    label: Motley Fool
  - url: https://www.cnbc.com/id/100003114/device/rss/rss.html
    label: CNBC Investing
  - url: https://www.cnbc.com/id/10001147/device/rss/rss.html
    label: CNBC Top Stories
  - url: https://feeds.bloomberg.com/markets/news.rss
    label: Bloomberg Markets

  # Central Banks & Policy
  - url: https://www.bankofcanada.ca/feed/
    label: Bank of Canada

  # AI & Fintech
  - url: https://www.benzinga.com/feed
    label: Benzinga
  - url: https://www.marketwatch.com/rss/topstories
    label: MarketWatch

  # ETF & Index Tracking
  - url: https://etfdb.com/feed/
    label: ETF Database

  # Crypto & Emerging Assets
  - url: https://cointelegraph.com/rss
    label: CoinTelegraph

  # Research & Analysis
  # seekingalpha.com removed — in _blocked_sources.yaml (paywalled, speculative)
  - url: https://www.investing.com/rss/news.rss
    label: Investing.com
  # Google News — supplementary market coverage
  - url: "https://news.google.com/rss/search?q=stock+market+investing+news&hl=en-CA&gl=CA&ceid=CA:en"
    label: Google News Investing
  - url: "https://news.google.com/rss/search?q=TSX+Canadian+stock+market&hl=en-CA&gl=CA&ceid=CA:en"
    label: Google News TSX
  - url: "https://news.google.com/rss/search?q=ETF+index+fund+investing&hl=en-CA&gl=CA&ceid=CA:en"
    label: Google News ETF
  # Reddit — investing communities
  - url: "https://www.reddit.com/r/CanadianInvestor/.rss"
    label: r/CanadianInvestor
  - url: "https://www.reddit.com/r/investing/.rss"
    label: r/investing
  - url: "https://www.reddit.com/r/stocks/.rss"
    label: r/stocks
  # --- Round 4 additions (April 2026) ---
  # seekingalpha.com/market_currents removed — blocked source
  - url: https://www.cbc.ca/cmlink/rss-business
    label: CBC Business

web_search_queries:
  - "stock market investing news today"
  - "TSX Canadian market news"
  - "ETF investing strategy news"
  - "AI investing fintech news"

min_articles: 6

keywords:
  - AI investing
  - algorithmic trading
  - ETF strategy
  - TFSA
  - RRSP
  - FHSA
  - TSX
  - sector rotation
  - momentum investing
  - value investing
  - swing trading
  - options strategy
  - robo-advisor
  - Wealthsimple
  - technical analysis
  - earnings surprise
  - capital gains
  - fintech
  - risk management
  - modern portfolio theory
  - Bank of Canada rate
  - dividend growth
  - stock screener
  - portfolio rebalancing
  - covered call
  - earnings report
  - interest rate decision
  - dollar cost averaging

llm:
  provider: xai
  system_prompt_file: shows/prompts/modern_investing_system.txt
  digest_prompt_file: shows/prompts/modern_investing_digest.txt
  podcast_prompt_file: shows/prompts/modern_investing_podcast.txt
  digest_temperature: 0.5
  podcast_temperature: 0.7
  max_tokens: 4000
  podcast_max_tokens: 8000
  min_podcast_words: 2000
  podcast_chain: true

tts:
  voice_id: dTrBzPvD2GpAqkk1MUzA
  stability: 0.5
  similarity_boost: 0.75
  style: 0.0
  use_speaker_boost: true
  max_chars: 10000

audio:
  # TODO: Generate dedicated music file — see assets/music/README.md for prompt.
  # Falling back to TST theme until modern_investing.mp3 is created.
  music_file: assets/music/tesla_shorts_time.mp3
  voice_intro_delay: 5.0
  intro_duration: 5.0
  overlap_duration: 10.0
  fade_duration: 10.0
  outro_duration: 30.0
  outro_crossfade: 20.0
  intro_volume: 0.5
  overlap_volume: 0.4
  fade_volume: 0.3
  outro_volume: 0.3

publishing:
  rss_file: modern_investing_podcast.rss
  rss_title: "Modern Investing Techniques"
  rss_description: "Daily investing podcast using AI-driven analysis and modern tools to identify market opportunities, track simulated trades, and teach strategies that aim to outperform index funds. Covering Canadian and US markets with actionable picks, performance tracking, and lessons learned."
  rss_link: https://nerranetwork.com/modern-investing.html
  rss_author: "Modern Investing Techniques"
  rss_email: patrick@planetterrian.com
  rss_image: https://nerranetwork.com/assets/covers/modern-investing.jpg
  rss_category: Business
  rss_subcategory: Investing
  rss_language: en-us
  guid_prefix: modern-investing
  base_url: https://nerranetwork.com
  audio_subdir: digests/modern_investing
  summaries_json: digests/modern_investing/summaries_modern_investing.json
  summaries_podcast_name: modern_investing
  player_html: modern-investing.html
  summaries_html: modern-investing-summaries.html
  x_enabled: false
  x_env_prefix: ""

episode:
  prefix: Modern_Investing
  filename_pattern: "{prefix}_Ep{num:03d}_{date:%Y%m%d}.mp3"
  output_dir: digests/modern_investing
  mp3_glob: "Modern_Investing_Ep*.mp3"

chapters:
  enabled: true
  section_markers:
    - pattern: "Welcome.*Modern Investing|first episode of Modern Investing|Good morning.*Modern Investing|This is Modern Investing|Modern Investing Techniques.*episode"
      title: "Introduction"
    - pattern: "market pulse|market overview|here's where markets|let's check the pulse|check.*pulse"
      title: "Market Pulse"
    - pattern: "strategy spotlight|strategy of the day|today's strategy|educational centrepiece"
      title: "Strategy Spotlight"
    - pattern: "investor education|deep dive|how.*works"
      title: "Investor Education"
    - pattern: "practice investment|AI pick|today's pick|trade of the day|simulated trade"
      title: "Practice Investment of the Day"
    - pattern: "yesterday's trade|trade review|how did .* pick|weekly hold|last week's hold|mid-week update"
      title: "Trade Review & Lessons"
    - pattern: "tools and techniques|tools & techniques|recommended tools|let's talk tools"
      title: "Tools & Techniques"
    - pattern: "quick hits|rapid fire|shorter items|rapid-fire"
      title: "Quick Hits"
    - pattern: "portfolio tracker|running total|portfolio performance|simulated track record"
      title: "Portfolio Performance"
    - pattern: "That's Modern Investing|wraps up|wraps up.*episode"
      title: "Closing"

newsletter:
  enabled: true
  platform: buttondown
  api_key_env: BUTTONDOWN_API_KEY
  status: about_to_send
  tag: "Modern Investing Techniques"
  weekly_prompt_file: shows/prompts/modern_investing_weekly.txt

slow_news:
  enabled: true
  library_file: shows/segments/modern_investing.json
  max_segments: 2
  cooldown_days: 30
